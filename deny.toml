# cargo-deny configuration for faultline
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
ignore = [
    # RUSTSEC-2026-0097: rand 0.8 unsound only when a custom logger calls
    # rand::rng() and ThreadRng reseeds inside that logger. We use tracing
    # (not log) and never call rand from a logging context. Upgrading to
    # rand 0.9+ requires coordinated updates across rand_chacha, rand_distr,
    # statrs, and nalgebra — planned for a future release.
    "RUSTSEC-2026-0097",
]

[licenses]
# Allow common permissive licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "Unicode-3.0",
]
confidence-threshold = 0.8
# Workspace crates inherit license from [workspace.package]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = [
    { crate = "openssl", use-instead = "rustls" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
