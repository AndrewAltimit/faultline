# Persistent Covert Surveillance Network — Defensive Planning Wargame
#
# ETRA Scenario 5 analogue. Research simulation of a long-dwell,
# low-signature surveillance campaign against a notional integrated
# federal protective posture. The analytical purpose of the scenario
# is to quantify how much intelligence a patient adversary can
# accumulate inside the defender's detection window when the defender
# relies primarily on episodic physical inspection rather than
# continuous RF-environment monitoring.
#
# The scenario is framed as a defensive wargame: the analytical
# outputs are the defender's detection window, attribution confidence
# on eventual discovery, and the cost-asymmetry ratio between the
# commodity-component surveillance footprint and the inspection /
# remediation program required to close the gap.
#
# All parameters are aggregate statistical descriptors derived from
# publicly available sources:
#
#   - GAO public reporting on C-UAS and physical security coordination
#   - CISA public insights on RF environment monitoring gaps
#   - RAND public research on commodity-component surveillance costs
#   - Published hobbyist / maker literature on solar-powered ESP32-class
#     sensor costs, battery life, and LTE backhaul economics
#   - Academic open-source research on rooftop inspection cadence and
#     detection rates for non-destructive covert emplacement
#
# Real agency names appear where they help the defender map simulation
# outputs onto actual posture decisions. The scenario is descriptive,
# not prescriptive, and no classified, CUI, or export-controlled
# information is used.

# Budget caps. Max possible attacker spend across the full kill chain
# (recon → emplacement → dwell → wireless → exfil → disclosure) is
# $11.2k; the cap below bites at the wireless-collection phase in a
# fraction of runs, exercising the engine's budget-exhaustion path.
# Defender cap is non-binding — the scenario measures detection
# window, not defender budget pressure.
attacker_budget = 10_000.0
defender_budget = 25_000_000.0

[meta]
name = "Persistent Covert Surveillance Network — Defensive Wargame"
description = "Research simulation of a long-dwell commodity-component surveillance campaign against a notional federal protective posture. Quantifies the defender's detection window, attribution confidence, and the cost-asymmetry ratio between the adversary's sensor footprint and the inspection / remediation program required to close the gap."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["surveillance", "osint", "kill-chain", "phase-6", "defensive-planning", "covert-sensors"]

