# ============================================================================
# Kill Chain — ETRA Scenario 5 archetype
# ============================================================================
#
# The campaign unfolds as:
#
#   recon → commodity emplacement → long dwell → wireless collection →
#   exfil / aggregation → disclosure event (or abort on detection)
#
# The analytical signal is the distribution over terminal phases
# across Monte Carlo runs: what fraction of runs reach disclosure,
# how many ticks pass before abort (the detection window), and the
# cost-asymmetry ratio between the attacker's <$100k footprint and
# the defender's multi-million-dollar closure program.

[kill_chains.covsurv]
id = "covsurv"
name = "Persistent Covert Surveillance Campaign"
description = "Long-dwell commodity-component surveillance campaign. Models the defender's exposure window between first emplacement and eventual discovery — or, in a fraction of runs, the absence of discovery before public disclosure."
attacker = "research_cell"
target = "federal_protection"
entry_phase = "covsurv_open_source_recon"

# -- Phase 1: open-source reconnaissance ------------------------------------

[kill_chains.covsurv.phases.covsurv_open_source_recon]
id = "covsurv_open_source_recon"
name = "Open-Source Target Reconnaissance"
description = "Aggregate model of publicly sourced reconnaissance against the target facility footprint: building exteriors, rooftop sight lines, staff-frequented establishments, commercial tenant patterns. Uses only categories of information available to any open-source researcher."
base_success_probability = 0.95
min_duration = 3
max_duration = 8
detection_probability_per_tick = 0.001
prerequisite_success_boost = 0.0
attribution_difficulty = 0.97
targets_domains = ["SignalsIntelligence"]

[kill_chains.covsurv.phases.covsurv_open_source_recon.cost]
attacker_dollars = 200.0
defender_dollars = 500_000.0
attacker_resources = 0.3

[[kill_chains.covsurv.phases.covsurv_open_source_recon.outputs]]
type = "IntelligenceGain"
amount = 0.10

[[kill_chains.covsurv.phases.covsurv_open_source_recon.branches]]
condition = { type = "OnSuccess" }
next_phase = "covsurv_sensor_emplacement"

[[kill_chains.covsurv.phases.covsurv_open_source_recon.branches]]
condition = { type = "OnDetection" }
