# US Institutional Fracture Scenario
#
# Models a hypothetical multi-faction institutional crisis within the
# United States, exploring how cascading institutional failures could
# create competing power centers. All parameters are derived from publicly
# available political science research, OSINT polling data, and
# academic conflict analysis literature.
#
# References:
# - V-Dem Institute: Democracy indices and institutional trust metrics
# - Pew Research Center: Political polarization and institutional trust surveys
# - CRS Reports: National Guard deployment authorities and federal structure
# - IISS Military Balance: Force structure data (publicly available summaries)
# - Academic: Acemoglu & Robinson (institutional fragility), Turchin (political stress)

[meta]
name = "US Institutional Fracture"
description = "Multi-faction institutional crisis with federal, state, militia, and foreign influence actors across 8 US macro-regions"
author = "faultline-ai"
version = "0.1.0"
tags = ["institutional", "multi-faction", "domestic", "365-day"]

