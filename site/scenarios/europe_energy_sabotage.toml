# European Energy Infrastructure Sabotage — Defensive Planning Wargame
#
# Research simulation of a covert, multi-phase campaign targeting
# European energy infrastructure. The scenario is framed as a
# defensive-planning wargame for NATO / EU critical-infrastructure
# protection planners: its analytical purpose is to quantify the
# cost-asymmetry ratio between a plausible attacker footprint and
# the defender posture required to close the detection gap on
# cross-border energy systems.
#
# The campaign archetype — offshore subsea infrastructure observation
# → AIS / transponder deception → cross-border gas / electrical
# corridor targeting → public disclosure — is drawn from publicly
# reported incidents (Nord Stream post-incident analysis in open
# press, public reporting on Baltic undersea cable incidents,
# ENTSO-E published transmission system descriptions, and academic
# literature on AIS spoofing).
#
# All parameters are aggregate statistical descriptors from publicly
# available sources:
#
#   - ENTSO-E public transmission-system operator reports
#   - IISS Military Balance public force-structure descriptions
#   - CISA / ENISA public insights on critical infrastructure risk
#   - RAND public research on subsea infrastructure vulnerability
#   - Open-press coverage of 2022+ Baltic and North Sea incidents
#   - Academic open-source research on AIS spoofing and Remote-ID
#
# No classified, CUI, or export-controlled information is used. Real
# names appear where they help the defender map simulation outputs
# onto real planning decisions; the scenario is descriptive, not
# prescriptive.

# Budget caps. Max possible attacker spend across the full kill chain
# (survey → staging → emplacement → disruption) is $773k; the cap below
# bites during the terminal disruption phase in a fraction of runs,
# exercising the engine's budget-exhaustion path. Defender cap is set
# well above the dominant disruption-event cost so it never binds —
# the scenario is a defender-response stress test, not a defender
# budget-exhaustion test.
attacker_budget = 600_000.0
defender_budget = 2_000_000_000.0

[meta]
name = "European Energy Infrastructure Sabotage — Defensive Wargame"
description = "Research simulation of a multi-phase covert campaign against European cross-border energy infrastructure. Exercises the kill chain schema to quantify the cost-asymmetry ratio and detection window between plausible attacker tradecraft and the NATO / EU defender posture required to close the gap."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["europe", "nato", "energy", "kill-chain", "phase-6", "defensive-planning", "subsea"]

