id = "energy_offshore_staging"
name = "Offshore Staging & Cover"
description = "Aggregate model of commercial-cover vessel movement and USV staging in a plausible commercial corridor. AIS spoofing supplements cover. No specific vessel operations are modeled; the analytical purpose is to force the defender's naval patrol density and AIS validation coverage into the success calculation."
prerequisites = ["energy_target_survey"]
