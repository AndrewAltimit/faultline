defender_dollars = 2_000_000.0
attacker_resources = 0.5

[[kill_chains.energy_sabotage.phases.energy_target_survey.outputs]]
type = "IntelligenceGain"
amount = 0.15

[[kill_chains.energy_sabotage.phases.energy_target_survey.branches]]
condition = { type = "OnSuccess" }
next_phase = "energy_offshore_staging"

[[kill_chains.energy_sabotage.phases.energy_target_survey.branches]]
condition = { type = "OnDetection" }
next_phase = "energy_abort"

# -- Offshore staging -------------------------------------------------------

