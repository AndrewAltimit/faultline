# ============================================================================
# Kill Chain — European energy infrastructure sabotage archetype
# ============================================================================

[kill_chains.energy_sabotage]
id = "energy_sabotage"
name = "Cross-Border Energy Infrastructure Sabotage"
description = "Multi-phase covert campaign against European cross-border energy corridors. Models the defender's exposure window, cost-asymmetry ratio, and attribution confidence across four archetypal phases: target survey → offshore staging → subsea emplacement → coordinated disruption event."
attacker = "sabotage_cell"
target = "nato_cip"
entry_phase = "energy_target_survey"

# -- Target survey ----------------------------------------------------------

[kill_chains.energy_sabotage.phases.energy_target_survey]
id = "energy_target_survey"
name = "Open-Source Target Survey"
description = "Aggregate model of open-source reconnaissance against ENTSO-E cross-border corridors, published subsea cable and pipeline routing maps, and commercial shipping lanes in the Baltic and North Sea. Uses only categories of information published by operators, regulators, or academic researchers."
base_success_probability = 0.95
min_duration = 5
max_duration = 12
detection_probability_per_tick = 0.002
prerequisite_success_boost = 0.0
attribution_difficulty = 0.95
targets_domains = ["SignalsIntelligence", "NetworkSecurity"]

[kill_chains.energy_sabotage.phases.energy_target_survey.cost]
