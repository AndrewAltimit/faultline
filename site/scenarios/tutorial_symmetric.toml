# Tutorial: Symmetric Conflict
#
# Two equal forces on a simple 4-region map. No technology cards,
# no events, no population dynamics. Pure Lanchester attrition
# with basic utility-based AI.
#
# This is the simplest possible scenario for testing the engine.

[meta]
name = "Tutorial — Symmetric Conflict"
description = """
Two equal factions, four regions in a square. Each faction starts
with one infantry unit in their home region. First to control 3 of 4
regions wins. Simple Lanchester square attrition.
"""
author = "AndrewAltimit"
version = "0.1.0"
tags = ["tutorial", "symmetric", "simple"]

[map]
[map.source]
type = "Grid"
width = 2
height = 2

[map.regions.north_west]
id = "north_west"
name = "North-West"
population = 500000
urbanization = 0.5
initial_control = "alpha"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.regions.north_east]
id = "north_east"
name = "North-East"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_west]
id = "south_west"
name = "South-West"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_east]
id = "south_east"
name = "South-East"
population = 500000
urbanization = 0.5
initial_control = "bravo"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.infrastructure]

[[map.terrain]]
region = "north_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "north_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

# -- Factions ---------------------------------------------------------------

[factions.alpha]
id = "alpha"
name = "Faction Alpha"
description = "Northern force"
color = "#3366CC"
tech_access = []
initial_morale = 0.8
logistics_capacity = 10.0
initial_resources = 100.0
resource_rate = 5.0
command_resilience = 0.5
intelligence = 0.5
diplomacy = []
doctrine = "Conventional"

[factions.alpha.faction_type]
kind = "Military"
branch = "Army"

[factions.alpha.forces.alpha_infantry]
id = "alpha_infantry"
name = "Alpha 1st Infantry"
unit_type = "Infantry"
region = "north_west"
strength = 100.0
mobility = 1.0
upkeep = 2.0
morale_modifier = 0.0
capabilities = []

[factions.bravo]
id = "bravo"
name = "Faction Bravo"
description = "Southern force"
color = "#CC3333"
tech_access = []
initial_morale = 0.8
logistics_capacity = 10.0
initial_resources = 100.0
resource_rate = 5.0
command_resilience = 0.5
intelligence = 0.5
diplomacy = []
doctrine = "Conventional"

[factions.bravo.faction_type]
kind = "Military"
branch = "Army"

[factions.bravo.forces.bravo_infantry]
id = "bravo_infantry"
name = "Bravo 1st Infantry"
unit_type = "Infantry"
region = "south_east"
strength = 100.0
mobility = 1.0
upkeep = 2.0
morale_modifier = 0.0
capabilities = []

# -- Technology (none for this tutorial) ------------------------------------

[technology]

# -- Political Climate (minimal) -------------------------------------------

[political_climate]
tension = 0.3
institutional_trust = 0.7
population_segments = []
global_modifiers = []

[political_climate.media_landscape]
fragmentation = 0.3
disinformation_susceptibility = 0.2
state_control = 0.1
social_media_penetration = 0.5
internet_availability = 0.9

# -- Events (none for this tutorial) ----------------------------------------

[events]

# -- Simulation Config ------------------------------------------------------

[simulation]
max_ticks = 100
monte_carlo_runs = 100
fog_of_war = false
snapshot_interval = 10
seed = 42

[simulation.tick_duration]
Days = 1

[simulation.attrition_model]
Stochastic = { noise = 0.1 }

# -- Victory Conditions -----------------------------------------------------

[victory_conditions.alpha_control]
id = "alpha_control"
name = "Alpha Strategic Control"
faction = "alpha"

[victory_conditions.alpha_control.condition]
type = "StrategicControl"
threshold = 0.75

[victory_conditions.bravo_control]
id = "bravo_control"
name = "Bravo Strategic Control"
faction = "bravo"

[victory_conditions.bravo_control.condition]
type = "StrategicControl"
threshold = 0.75
