description = "Three concurrent ETRA Appendix D kill chains (Alpha / Bravo / Charlie) against the US federal security apparatus. Exercises the Phase 6.1 multi-phase campaign schema, cost asymmetry tracking, detection accumulation, and attribution scoring."
