# Compound Kill Chains — ETRA Appendix D (Alpha / Bravo / Charlie)
#
# Exercises the Phase 6.1 `[kill_chains]` TOML schema with three
# concurrent multi-phase campaigns targeting the US federal security
# apparatus. Each chain models a distinct ETRA Appendix D profile:
#
#   - Kill Chain Alpha: Intelligence-led coercion — sensor emplacement,
#     wireless exploitation, credential harvest, coercive disclosure.
#     Attribution: opaque. Cost asymmetry: ~10,000x.
#
#   - Kill Chain Bravo: Escalatory proof-of-capability — inert swarm
#     penetration of a public perimeter with drop-and-leaflet messaging.
#     Attribution: partial. Cost asymmetry: ~1,000x.
#
#   - Kill Chain Charlie: Cyber-physical convergence — drone-delivered
#     rogue-AP mesh backing a ransomware-style compromise of critical
#     infrastructure during a simultaneous physical demonstration.
#     Attribution: moderate. Cost asymmetry: ~5,000x.
#
# All phases, durations, detection probabilities, and costs are derived
# from open-source ETRA framework analysis and CRS / GAO reporting on
# C-UAS gaps, CISA incident retrospectives, and published Natural Earth /
# IISS order-of-battle data. No classified or CUI material.
#
# References:
# - ETRA "Autonomous Drone Swarms as Instruments of Political
#   Destabilization" (2026), Appendix D
# - GAO-23-105912 "Counter-Unmanned Aircraft Systems: DHS and DOJ Should
#   Establish Baseline Plans for Protecting Covered Events"
# - CISA Insights "Protecting Against the Threat of Unmanned Aircraft
#   Systems" (2020)
# - RAND RR-3023-DHS "Small Unmanned Aerial System Adversary Capabilities"

# Budget caps (Phase 6.2) — top-level scenario fields. Must appear before
# the first section header so TOML does not attach them to [meta].
attacker_budget = 250_000.0
defender_budget = 50_000_000.0

