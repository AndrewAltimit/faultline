defender_dollars = 8500000.0
attacker_resources = 12.0

[[kill_chains.decap_chain.phases.swarm_launch.outputs]]
type = "InfraDamage"
region = "target_zone"
factor = 0.6

[[kill_chains.decap_chain.phases.swarm_launch.outputs]]
type = "TensionDelta"
delta = 0.3

[[kill_chains.decap_chain.phases.swarm_launch.outputs]]
type = "MoraleDelta"
faction = "protective_detail"
delta = -0.35

[[kill_chains.decap_chain.phases.swarm_launch.outputs]]
type = "InstitutionalErosion"
delta = 0.2

[[kill_chains.decap_chain.phases.swarm_launch.outputs]]
type = "PoliticalCost"
delta = 0.4

[[kill_chains.decap_chain.phases.swarm_launch.branches]]
next_phase = "exfiltration"
[kill_chains.decap_chain.phases.swarm_launch.branches.condition]
type = "Always"

# Phase 6: Exfiltrate operators via corridor.
[kill_chains.decap_chain.phases.exfiltration]
id = "exfiltration"
name = "Operator Exfiltration"
description = "Withdraw the forward operator cell through the exfil corridor"
