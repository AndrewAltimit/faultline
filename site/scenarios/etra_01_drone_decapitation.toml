[[kill_chains.decap_chain.phases.credential_harvest.branches]]
next_phase = "swarm_launch"
[kill_chains.decap_chain.phases.credential_harvest.branches.condition]
type = "OnSuccess"

[[kill_chains.decap_chain.phases.credential_harvest.branches]]
next_phase = "swarm_launch"
[kill_chains.decap_chain.phases.credential_harvest.branches.condition]
type = "OnFailure"

# Phase 5: Launch autonomous drone swarm during principal appearance.
[kill_chains.decap_chain.phases.swarm_launch]
id = "swarm_launch"
name = "Autonomous Swarm Launch"
description = "Eight-drone FPV swarm launched during off-site appearance window"
prerequisites = ["pattern_of_life"]
base_success_probability = 0.35
min_duration = 1
max_duration = 1
detection_probability_per_tick = 0.9
prerequisite_success_boost = 0.15
attribution_difficulty = 0.4
targets_domains = ["CounterUAS", "PhysicalSecurity", "ExecutiveProtection"]

[kill_chains.decap_chain.phases.swarm_launch.cost]
