# ETRA Scenario 1 — Autonomous Drone Swarm Executive Decapitation
#
# Models a multi-phase kill chain targeting a high-value principal
# during a public appearance. The attacker conducts wireless
# reconnaissance → covert sensor emplacement → pattern-of-life
# analysis → credential harvest of the principal's protective
# detail → culminating kinetic action via an autonomous drone swarm
# during an off-site appearance.
#
# This scenario is intentionally analytical: a four-region abstract
# map (attacker base, staging, target zone, exfiltration corridor),
# two factions (an opaque Threat Actor and a federal Protective
# Detail), and a six-phase kill chain with explicit detection
# probabilities, dollar-denominated costs, and defensive domain
# annotations.
#
# All parameters are derived from published OSINT on commercial
# drone capabilities, executive protection doctrine (USSS public
# congressional testimony), and published cyber-physical research.
# See docs/etra_scenarios.md for source citations.

[meta]
name = "ETRA 1 — Drone Swarm Executive Decapitation"
description = """
Six-phase kill chain targeting a principal during an off-site
appearance. The attacker exploits seams between physical security,
cyber, and counter-UAS defensive domains. Defender response lags
attacker kill-chain execution by a factor of ~180× (45-minute
cross-domain incident response vs 15-second kinetic attack window).
"""
author = "AI Agent Bot"
version = "0.1.0"
tags = ["etra", "drone", "kill-chain", "executive-protection", "phase-6"]

