# -- Kill Chain (Phase 6.1) -------------------------------------------------

[kill_chains.decap_chain]
id = "decap_chain"
name = "Decapitation Kill Chain"
description = "Wireless recon → sensor emplacement → pattern-of-life → credential harvest → drone swarm → exfil"
attacker = "threat_actor"
target = "protective_detail"
entry_phase = "wireless_recon"

# Phase 1: Wireless reconnaissance of venue and staff.
[kill_chains.decap_chain.phases.wireless_recon]
id = "wireless_recon"
name = "Wireless Reconnaissance"
description = "Passive SDR/WiFi/BLE capture from public spaces near venue"
prerequisites = []
base_success_probability = 0.92
min_duration = 10
max_duration = 20
detection_probability_per_tick = 0.005
prerequisite_success_boost = 0.0
attribution_difficulty = 0.9
targets_domains = ["SignalsIntelligence", "NetworkSecurity"]

[kill_chains.decap_chain.phases.wireless_recon.cost]
attacker_dollars = 3000.0
defender_dollars = 180000.0
attacker_resources = 5.0

[[kill_chains.decap_chain.phases.wireless_recon.outputs]]
type = "IntelligenceGain"
amount = 0.15

[[kill_chains.decap_chain.phases.wireless_recon.branches]]
next_phase = "sensor_emplacement"
[kill_chains.decap_chain.phases.wireless_recon.branches.condition]
type = "OnSuccess"

# Phase 2: Emplace covert persistent sensors near venue.
[kill_chains.decap_chain.phases.sensor_emplacement]
id = "sensor_emplacement"
name = "Covert Sensor Emplacement"
description = "Deploy solar-sustained covert sensors along venue approach"
prerequisites = ["wireless_recon"]
base_success_probability = 0.78
min_duration = 14
max_duration = 28
detection_probability_per_tick = 0.008
prerequisite_success_boost = 0.05
attribution_difficulty = 0.75
targets_domains = ["PhysicalSecurity", "CounterUAS"]

[kill_chains.decap_chain.phases.sensor_emplacement.cost]
attacker_dollars = 4000.0
defender_dollars = 350000.0
attacker_resources = 8.0

[[kill_chains.decap_chain.phases.sensor_emplacement.outputs]]
type = "IntelligenceGain"
amount = 0.2

[[kill_chains.decap_chain.phases.sensor_emplacement.branches]]
next_phase = "pattern_of_life"
[kill_chains.decap_chain.phases.sensor_emplacement.branches.condition]
type = "OnSuccess"

# Phase 3: Analyze pattern of life for the principal.
[kill_chains.decap_chain.phases.pattern_of_life]
id = "pattern_of_life"
name = "Pattern-of-Life Analysis"
description = "Correlate sensor data to identify principal's predictable vulnerabilities"
prerequisites = ["sensor_emplacement"]
base_success_probability = 0.85
min_duration = 30
max_duration = 60
detection_probability_per_tick = 0.002
prerequisite_success_boost = 0.06
attribution_difficulty = 0.95
targets_domains = ["ExecutiveProtection", "SignalsIntelligence"]

[kill_chains.decap_chain.phases.pattern_of_life.cost]
attacker_dollars = 2000.0
defender_dollars = 500000.0
attacker_resources = 4.0

[[kill_chains.decap_chain.phases.pattern_of_life.outputs]]
type = "IntelligenceGain"
amount = 0.25

[[kill_chains.decap_chain.phases.pattern_of_life.outputs]]
type = "InstitutionalErosion"
delta = 0.05

[[kill_chains.decap_chain.phases.pattern_of_life.branches]]
next_phase = "credential_harvest"
[kill_chains.decap_chain.phases.pattern_of_life.branches.condition]
type = "OnSuccess"

# Phase 4: Credential harvest targeting detail members.
[kill_chains.decap_chain.phases.credential_harvest]
id = "credential_harvest"
name = "Credential Harvest"
description = "Spear-phish or coerce a detail member for privileged access"
prerequisites = ["pattern_of_life"]
base_success_probability = 0.45
min_duration = 15
max_duration = 30
detection_probability_per_tick = 0.02
prerequisite_success_boost = 0.12
attribution_difficulty = 0.65
targets_domains = ["NetworkSecurity", "InsiderThreat"]

[kill_chains.decap_chain.phases.credential_harvest.cost]
attacker_dollars = 5000.0
defender_dollars = 1200000.0
attacker_resources = 6.0

[[kill_chains.decap_chain.phases.credential_harvest.outputs]]
type = "IntelligenceGain"
amount = 0.15

[[kill_chains.decap_chain.phases.credential_harvest.outputs]]
type = "CoercionPressure"
