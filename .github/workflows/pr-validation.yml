---
name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Fork guard: block fork PRs from running on self-hosted runners with write perms
  fork-guard:
    name: Fork PR Guard
    runs-on: self-hosted
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - run: echo "Not a fork PR - proceeding"

  # -- CI Stages (containerized) -------------------------------------------
  ci:
    name: Faultline CI
    needs: fork-guard
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Set UID/GID
        run: |
          echo "USER_ID=$(id -u)" >> $GITHUB_ENV
          echo "GROUP_ID=$(id -g)" >> $GITHUB_ENV

      - name: Build CI Docker image
        run: docker compose --profile ci build rust-ci

      # -- Formatting -------------------------------------------------------
      - name: Format check
        timeout-minutes: 5
        run: docker compose --profile ci run --rm rust-ci cargo fmt --all -- --check

      # -- Linting -----------------------------------------------------------
      - name: Clippy
        timeout-minutes: 10
        run: docker compose --profile ci run --rm rust-ci cargo clippy --workspace -- -D warnings

      # -- Tests -------------------------------------------------------------
      - name: Test
        timeout-minutes: 15
        run: |
          set -o pipefail
          docker compose --profile ci run --rm rust-ci \
            cargo test --workspace 2>&1 | tee test_output.txt

      # -- Build -------------------------------------------------------------
      - name: Build (release)
        timeout-minutes: 15
        run: docker compose --profile ci run --rm rust-ci cargo build --workspace --release

      # -- License / Advisory ------------------------------------------------
      - name: cargo-deny
        run: docker compose --profile ci run --rm rust-ci cargo deny check

      # -- Reference sanitization guard --------------------------------------
      # Blocks any commit that re-introduces references coupling Faultline
      # to a specific external threat-assessment publication. See
      # tools/ci/grep-guard.sh for the rule and the whitelist.
      - name: Reference sanitization guard
        run: ./tools/ci/grep-guard.sh

      # -- Reproducibility smoke test (Epic Q) -------------------------------
      # For every bundled scenario, emits a manifest and replays it via
      # `--verify` to confirm bit-identical output. Catches regressions
      # in the determinism contract before they merge.
      # Detail in tools/ci/verify-bundled-scenarios.sh.
      - name: Reproducibility smoke test
        timeout-minutes: 10
        run: docker compose --profile ci run --rm rust-ci ./tools/ci/verify-bundled-scenarios.sh

      # -- Schema migration smoke test (Epic O) ------------------------------
      # For every bundled scenario, runs `--migrate` through the registered
      # migration chain and re-validates the emitted form. Catches drift
      # between bundled scenarios and the live schema before they merge.
      # Detail in tools/ci/verify-migration.sh.
      - name: Schema migration smoke test
        timeout-minutes: 10
        run: docker compose --profile ci run --rm rust-ci ./tools/ci/verify-migration.sh

      # -- JS Tests ----------------------------------------------------------
      # Pure-logic frontend modules (pinned store, comparison deltas, diff
      # renderer, sharing roundtrip, heatmap aggregation) are exercised
      # via Node's built-in test runner. No package install needed —
      # tests/integration/*.test.mjs depends only on `node:test` and
      # `node:assert`.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: JS integration tests
        run: node --test tests/integration/*.test.mjs

      # -- Test Metrics -------------------------------------------------------
      - name: Test metrics summary
        if: always()
        run: |
          if [ ! -f test_output.txt ]; then
            echo "No test output captured (test step may have been skipped)."
            echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
            echo "No test output available." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          PASS=$(grep -c '\.\.\.  *ok$' test_output.txt 2>/dev/null) || PASS=0
          FAIL=$(grep -c 'FAILED$' test_output.txt 2>/dev/null) || FAIL=0
          TOTAL=$((PASS + FAIL))
          echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | $PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | $FAIL |" >> $GITHUB_STEP_SUMMARY
          echo "| Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY

      - name: Fix Docker file ownership
        if: always()
        run: |
          for dir in target outputs; do
            if [ -d "$dir" ]; then
              docker run --rm -v "$(pwd)/$dir:/workspace" busybox:1.36.1 \
                chown -Rh "$(id -u):$(id -g)" /workspace 2>/dev/null || true
            fi
          done

  # -- Claude Code Security Review (profile-based) -------------------------
  claude-security-review:
    name: Claude Code Security Review
    needs: fork-guard
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      review_status: ${{ steps.review-action.outputs.review_status }}
      is_agent_commit: ${{ steps.review-action.outputs.is_agent_commit }}
      review_artifact_name: ${{ steps.review-action.outputs.review_artifact_name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Run Claude security review
        id: review-action
        uses: ./.github/actions/claude-review
        with:
          pr_number: ${{ github.event.pull_request.number }}
          profile: 'security'

  # -- Claude Code Quality Review (runs in parallel with security) ---------
  claude-quality-review:
    name: Claude Code Quality Review
    needs: fork-guard
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      review_status: ${{ steps.review-action.outputs.review_status }}
      is_agent_commit: ${{ steps.review-action.outputs.is_agent_commit }}
      review_artifact_name: ${{ steps.review-action.outputs.review_artifact_name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Run Claude quality review
        id: review-action
        uses: ./.github/actions/claude-review
        with:
          pr_number: ${{ github.event.pull_request.number }}
          profile: 'quality'

  # -- OpenRouter General Review (runs in parallel with Claude reviews) ----
  openrouter-review:
    name: OpenRouter AI General Review
    needs: fork-guard
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: self-hosted
    timeout-minutes: 20
    continue-on-error: true
    outputs:
      review_status: ${{ steps.review-action.outputs.review_status }}
      is_agent_commit: ${{ steps.review-action.outputs.is_agent_commit }}
      review_artifact_name: ${{ steps.review-action.outputs.review_artifact_name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Run OpenRouter review
        id: review-action
        uses: ./.github/actions/openrouter-review
        with:
          pr_number: ${{ github.event.pull_request.number }}
          profile: 'openrouter-general'

  # -- Agent Review Response (responds to Claude/OpenRouter feedback) ------
  agent-review-response:
    name: Agent Review Response
    needs: [ci, claude-security-review, claude-quality-review, openrouter-review]
    if: |
      always() &&
      !cancelled() &&
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-fix')
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      made_changes: ${{ steps.agent-fix.outputs.made_changes }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          token: ${{ secrets.AGENT_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Ensure clean working directory
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true

      - name: Check iteration count
        id: iteration
        uses: ./.github/actions/agent-iteration-check
        with:
          pr_number: ${{ github.event.pull_request.number }}
          max_iterations: '5'
          agent_type: 'review-fix'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if max iterations reached
        if: steps.iteration.outputs.exceeded_max == 'true'
        run: |
          echo "Maximum iterations (5) reached for review-fix agent. Manual intervention required."
          echo "made_changes=false" >> $GITHUB_OUTPUT
          exit 0

      - name: Download review artifacts
        if: steps.iteration.outputs.should_skip != 'true'
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: '*-review-${{ github.run_id }}-${{ github.run_attempt }}'
          merge-multiple: true
          path: .

      - name: Run agent review response
        id: agent-fix
        if: steps.iteration.outputs.should_skip != 'true'
        env:
          CLAUDE_SECURITY_REVIEW_PATH: claude-security-review.md
          CLAUDE_QUALITY_REVIEW_PATH: claude-quality-review.md
          OPENROUTER_REVIEW_PATH: openrouter-review.md
          GEMINI_REVIEW_PATH: ""
          CODEX_REVIEW_PATH: ""
          BRANCH_NAME: ${{ github.head_ref }}
          ITERATION_COUNT: ${{ steps.iteration.outputs.iteration_count }}
        run: |
          if ! command -v automation-cli &>/dev/null; then
            echo "::warning::automation-cli not found on PATH - skipping review response"
            echo "made_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running agent review response..."
          automation-cli review respond \
            "$PR_NUMBER" \
            "$BRANCH_NAME" \
            "$ITERATION_COUNT" \
            "5"

  # -- Agent Failure Handler -----------------------------------------------
  agent-failure-handler:
    name: Agent Failure Handler
    needs: [ci, claude-security-review, claude-quality-review, openrouter-review, agent-review-response]
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'no-auto-fix') &&
      needs.ci.result == 'failure'
    runs-on: self-hosted
    timeout-minutes: 30
    outputs:
      made_changes: ${{ steps.agent-fix.outputs.made_changes }}
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GITHUB_TOKEN: ${{ secrets.AGENT_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Pre-checkout cleanup
        run: |
          for item in outputs target .git/index.lock; do
            if [ -d "$item" ] || [ -f "$item" ]; then
              docker run --rm -v "$(pwd):/workspace" busybox:1.36.1 sh -c \
                "rm -rf /workspace/$item" 2>/dev/null || \
                sudo rm -rf "$item" 2>/dev/null || true
            fi
          done

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false
          token: ${{ secrets.AGENT_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Ensure clean working directory
        run: |
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true

      - name: Check iteration count
        id: iteration
        uses: ./.github/actions/agent-iteration-check
        with:
          pr_number: ${{ github.event.pull_request.number }}
          max_iterations: '5'
          agent_type: 'failure-fix'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if max iterations reached
        if: steps.iteration.outputs.exceeded_max == 'true'
        run: |
          echo "Maximum iterations (5) reached for failure-fix agent. Manual intervention required."
          echo "made_changes=false" >> $GITHUB_OUTPUT
          exit 0

      - name: Run agent failure handler
        id: agent-fix
        if: steps.iteration.outputs.exceeded_max != 'true'
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          ITERATION_COUNT: ${{ steps.iteration.outputs.iteration_count }}
        run: |
          if ! command -v automation-cli &>/dev/null; then
            echo "::warning::automation-cli not found on PATH - skipping failure handler"
            echo "made_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Running agent failure handler..."
          automation-cli review failure \
            "$PR_NUMBER" \
            "$BRANCH_NAME" \
            "$ITERATION_COUNT" \
            "5" \
            "format,lint,test"

  # -- PR Status Summary ---------------------------------------------------
  pr-status:
    name: PR Status Summary
    needs: [ci, claude-security-review, claude-quality-review, openrouter-review, agent-review-response, agent-failure-handler]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Generate status summary
        run: |
          echo "## PR Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI | ${{ needs.ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Claude Security Review | ${{ needs.claude-security-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Claude Quality Review | ${{ needs.claude-quality-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenRouter Review | ${{ needs.openrouter-review.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Review Response | ${{ needs.agent-review-response.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failure Handler | ${{ needs.agent-failure-handler.result }} |" >> $GITHUB_STEP_SUMMARY

          # CI failure is blocking; reviews are advisory
          if [[ "${{ needs.ci.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "CI failed - please review the logs" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PR validation completed successfully" >> $GITHUB_STEP_SUMMARY
