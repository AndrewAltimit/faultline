name: 'OpenRouter AI Code Review'
description: 'Run OpenRouter API-based code review using Qwen 3.5'

inputs:
  pr_number:
    required: true
  profile:
    required: false
    default: 'openrouter-general'

outputs:
  review_status:
    value: ${{ steps.review.outputs.status }}
  is_agent_commit:
    value: ${{ steps.check-agent.outputs.is_agent_commit }}
  review_artifact_name:
    value: openrouter-review-${{ github.run_id }}-${{ github.run_attempt }}

runs:
  using: 'composite'
  steps:
    - name: Log commit info
      id: check-agent
      shell: bash
      run: |
        LAST_COMMIT_AUTHOR=$(git log -1 --format='%an')
        IS_AGENT_COMMIT="false"
        if [[ "$LAST_COMMIT_AUTHOR" == "AI Review Agent" ]] || \
           [[ "$LAST_COMMIT_AUTHOR" == "AI Pipeline Agent" ]] || \
           [[ "$LAST_COMMIT_AUTHOR" == "AI Agent Bot" ]]; then
          IS_AGENT_COMMIT="true"
        fi
        echo "is_agent_commit=$IS_AGENT_COMMIT" >> $GITHUB_OUTPUT

    - name: Verify API key
      shell: bash
      run: |
        if [ -z "${OPENROUTER_API_KEY:-}" ]; then
          echo "::error::OPENROUTER_API_KEY is not set"
          exit 1
        fi

    - name: Run OpenRouter Code Review
      id: review
      shell: bash
      env:
        PR_NUMBER: ${{ inputs.pr_number }}
        REVIEW_PROFILE: ${{ inputs.profile }}
      run: |
        if ! command -v github-agents &>/dev/null; then
          echo "::warning::github-agents not found - skipping"
          echo "status=skipped" >> $GITHUB_OUTPUT
          exit 0
        fi
        ARGS=(pr-review "$PR_NUMBER" --profile "$REVIEW_PROFILE")
        set +e
        OUTPUT=$(github-agents "${ARGS[@]}" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"
        echo "$OUTPUT" > openrouter-review.md
        if [ $EXIT_CODE -ne 0 ]; then
          if grep -qiE '429|rate.?limit|quota' <<< "$OUTPUT"; then
            echo "::warning::OpenRouter rate limit hit - skipping"
            echo "status=rate_limited" >> $GITHUB_OUTPUT
            exit 0
          elif grep -qiE '503|502|service.?unavailable' <<< "$OUTPUT"; then
            echo "::warning::OpenRouter unavailable - skipping"
            echo "status=unavailable" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit $EXIT_CODE
          fi
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload review artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: openrouter-review-${{ github.run_id }}-${{ github.run_attempt }}
        path: openrouter-review.md
        retention-days: 7
        if-no-files-found: ignore

    - name: Clean up
      if: always()
      shell: bash
      run: |
        git checkout -- . 2>/dev/null || true
        git clean -fd 2>/dev/null || true
