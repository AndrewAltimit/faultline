# Tier-1 alert triage queue: ~10 alerts/tick service, depth 100.
# Per published SOC surveys (ESG SOC modernization, Ponemon SOC cost),
# a mid-sized enterprise tier-1 cell triages roughly 8–15 alerts per
# analyst-shift; capacity is deliberately set below the noisy
# enumeration phase's burst rate so the queue accumulates a backlog
# during phase 1, which then persists into the (sequential) phase 2
# and 3 detection windows. That persistence is what produces the
# alert-fatigue effect — once a noise burst lands, it takes the
# defender a real number of ticks to dig out, and during the dig-out
# the real intrusion is rolling its detection rolls against a still-
# saturated queue.
[factions.blue_soc.defender_capacities.tier1_alerts]
id = "tier1_alerts"
name = "Tier-1 Alert Triage"
description = "Initial alert pipeline: high volume, low context, bounded analyst throughput. Saturated tier-1 means real signal sits in queue and ages out before being looked at — the canonical alert-fatigue mechanism. Overflow policy is `Backlog` because real SOC ticketing systems do not drop alerts — they accumulate them; the alert-fatigue cost is that the analyst working through a 300-deep backlog is rolling against impaired catch rates the entire time, not that the next page got dropped."
queue_depth = 100
service_rate = 10.0
overflow = "Backlog"
saturated_detection_factor = 0.30

# Tier-2 intrusion analysts: deeper investigation, much smaller queue
# but also much smaller volume of work — only escalated incidents
# arrive here. Backlog policy because forensic investigation never
# truly drops cases — they age in queue, modeling the published
# median dwell-time numbers (Mandiant M-Trends ~24 days for missed
# intrusions in mid-sized enterprises).
[factions.blue_soc.defender_capacities.tier2_intrusion]
id = "tier2_intrusion"
name = "Tier-2 Intrusion Analysis"
description = "Forensic investigation cell. Receives only escalated incidents. Smaller capacity matches the published median IR-team size for a mid-sized enterprise; lower service rate captures the deeper analytic effort each incident requires."
queue_depth = 5
service_rate = 0.8
overflow = "Backlog"
saturated_detection_factor = 0.40

