# ============================================================================
# Kill Chain — flooded SOC intrusion archetype
# ============================================================================
#
# Four phases:
#
#   noisy_enumeration  → credential_harvest  → lateral_movement  → exfiltration
#
# Phase 1 emits ~25 alerts/tick into tier-1 — well above the 12/tick
# service rate — so tier-1 saturates within the first few ticks of the
# run. While saturated, every detection roll on phases 2 and 3 is
# multiplied by tier-1's `saturated_detection_factor = 0.3`, dropping
# the *catch* rate from a baseline 8% to 2.4% per tick. The MC
# distribution surfaces how often that ~3× suppression turns a
# would-be detection into a successful exfil.
#
# Phase 4 (exfiltration) is gated by tier-2, which has smaller capacity
# and a backlog policy — it tracks ticks-to-saturation rather than
# dropping alerts, modeling forensic investigation backlog rather than
# alert fatigue per se.

[kill_chains.flooded_soc]
id = "flooded_soc"
name = "Flooded-SOC Intrusion Campaign"
description = "Multi-phase intrusion paired with a deliberate enumeration-noise attack against the defender's tier-1 alert pipeline. Quantifies the detection-rate suppression caused by SOC capacity saturation — the alert-fatigue effect measured in published SOC surveys."
attacker = "red_intrusion"
target = "blue_soc"
entry_phase = "noisy_enumeration"

# -- Phase 1: noisy enumeration ---------------------------------------------

[kill_chains.flooded_soc.phases.noisy_enumeration]
id = "noisy_enumeration"
name = "Noisy External Enumeration"
description = "Massively parallel external scanning, brute-force credential spraying, and login-failure probes. Each tick emits ~25 alerts into tier-1; well above the 12/tick service rate. The phase itself is loud (high detection_probability_per_tick), but its purpose is to saturate the queue and shadow the later phases — the defender catches *this* phase but pays the throughput cost."
base_success_probability = 0.95
min_duration = 6
max_duration = 12
detection_probability_per_tick = 0.10
prerequisite_success_boost = 0.0
attribution_difficulty = 0.85
targets_domains = ["NetworkSecurity"]

[kill_chains.flooded_soc.phases.noisy_enumeration.cost]
attacker_dollars = 5_000.0
defender_dollars = 800_000.0
attacker_resources = 1.0

[[kill_chains.flooded_soc.phases.noisy_enumeration.defender_noise]]
defender = "blue_soc"
role = "tier1_alerts"
items_per_tick = 60.0

[[kill_chains.flooded_soc.phases.noisy_enumeration.outputs]]
type = "IntelligenceGain"
amount = 0.10

[[kill_chains.flooded_soc.phases.noisy_enumeration.branches]]
condition = { type = "OnSuccess" }
next_phase = "credential_harvest"

# Detection here doesn't end the campaign — the noise IS the point.
# The OnDetection branch routes back to credential_harvest anyway,
# so the saturation effect persists for downstream phases.
[[kill_chains.flooded_soc.phases.noisy_enumeration.branches]]
condition = { type = "OnDetection" }
next_phase = "credential_harvest"

# -- Phase 2: credential harvest --------------------------------------------

[kill_chains.flooded_soc.phases.credential_harvest]
id = "credential_harvest"
name = "Credential Harvest via Phishing"
description = "Targeted phishing against a small set of identified privileged accounts. Generates only 2 alerts/tick — entirely buried in the tier-1 backlog the noisy_enumeration phase created. `gated_by_defender` says: this phase's detection probability is multiplied by the tier-1 saturated factor while the queue is full."
prerequisites = ["noisy_enumeration"]
base_success_probability = 0.70
min_duration = 4
max_duration = 9
detection_probability_per_tick = 0.08
prerequisite_success_boost = 0.05
attribution_difficulty = 0.80
targets_domains = ["NetworkSecurity", "InsiderThreat"]
gated_by_defender = { faction = "blue_soc", role = "tier1_alerts" }

[kill_chains.flooded_soc.phases.credential_harvest.cost]
attacker_dollars = 8_000.0
defender_dollars = 2_000_000.0
attacker_resources = 1.5

[[kill_chains.flooded_soc.phases.credential_harvest.defender_noise]]
defender = "blue_soc"
role = "tier1_alerts"
items_per_tick = 2.0

[[kill_chains.flooded_soc.phases.credential_harvest.outputs]]
type = "IntelligenceGain"
amount = 0.20

[[kill_chains.flooded_soc.phases.credential_harvest.branches]]
condition = { type = "OnSuccess" }
next_phase = "lateral_movement"

[[kill_chains.flooded_soc.phases.credential_harvest.branches]]
condition = { type = "OnDetection" }
next_phase = "intrusion_blocked"

# -- Phase 3: lateral movement ----------------------------------------------

[kill_chains.flooded_soc.phases.lateral_movement]
id = "lateral_movement"
name = "Lateral Movement to Crown-Jewel Network"
description = "Stolen credentials used to pivot from DMZ into the enterprise core. Each pivot generates 1 alert/tick into tier-1 — also gated by the saturated tier-1 queue, also therefore mostly missed under load."
prerequisites = ["credential_harvest"]
base_success_probability = 0.78
min_duration = 5
max_duration = 12
detection_probability_per_tick = 0.06
prerequisite_success_boost = 0.10
attribution_difficulty = 0.75
targets_domains = ["NetworkSecurity"]
gated_by_defender = { faction = "blue_soc", role = "tier1_alerts" }

[kill_chains.flooded_soc.phases.lateral_movement.cost]
attacker_dollars = 12_000.0
defender_dollars = 3_500_000.0
attacker_resources = 2.0

[[kill_chains.flooded_soc.phases.lateral_movement.defender_noise]]
defender = "blue_soc"
role = "tier1_alerts"
items_per_tick = 1.0

[[kill_chains.flooded_soc.phases.lateral_movement.outputs]]
type = "IntelligenceGain"
amount = 0.20

[[kill_chains.flooded_soc.phases.lateral_movement.branches]]
condition = { type = "OnSuccess" }
next_phase = "exfiltration"

[[kill_chains.flooded_soc.phases.lateral_movement.branches]]
condition = { type = "OnDetection" }
next_phase = "intrusion_blocked"

# -- Phase 4: exfiltration --------------------------------------------------

[kill_chains.flooded_soc.phases.exfiltration]
id = "exfiltration"
name = "Bulk Data Exfiltration"
description = "Bulk transfer of crown-jewel customer database. This phase is gated by tier-2 intrusion analysis (deeper forensic capability), not tier-1: large outbound transfers are escalated to tier-2 directly. Tier-2 has a tiny queue and a backlog overflow policy — it never drops, just ages out."
prerequisites = ["lateral_movement"]
base_success_probability = 0.85
min_duration = 3
max_duration = 8
detection_probability_per_tick = 0.12
prerequisite_success_boost = 0.05
attribution_difficulty = 0.70
targets_domains = ["NetworkSecurity"]
gated_by_defender = { faction = "blue_soc", role = "tier2_intrusion" }

[kill_chains.flooded_soc.phases.exfiltration.cost]
attacker_dollars = 6_000.0
defender_dollars = 8_000_000.0
attacker_resources = 1.5

[[kill_chains.flooded_soc.phases.exfiltration.defender_noise]]
defender = "blue_soc"
role = "tier2_intrusion"
items_per_tick = 0.4

[[kill_chains.flooded_soc.phases.exfiltration.outputs]]
type = "InfraDamage"
region = "enterprise_core"
factor = 0.30

[[kill_chains.flooded_soc.phases.exfiltration.outputs]]
type = "InstitutionalErosion"
delta = 0.12

[[kill_chains.flooded_soc.phases.exfiltration.outputs]]
type = "CoercionPressure"
delta = 0.20

[[kill_chains.flooded_soc.phases.exfiltration.branches]]
condition = { type = "OnDetection" }
next_phase = "intrusion_blocked"

# -- Terminal: defender intercepts ------------------------------------------

[kill_chains.flooded_soc.phases.intrusion_blocked]
id = "intrusion_blocked"
name = "Intrusion Detected & Contained"
description = "Terminal phase taken when the defender catches any phase. Models incident response, credential rotation, and forensic recovery."
base_success_probability = 1.0
min_duration = 1
