# Alert Fatigue — SOC Capacity Saturation Wargame
#
# Demonstrates the Epic K defender-capacity model: a multi-phase
# intrusion in which the attacker's first phase deliberately floods
# the defender's tier-1 SOC alert queue with low-quality noise, so
# that the genuinely interesting later phases slip past detection
# rolls the defender would have caught at idle.
#
# The analytical purpose is to quantify how much real-detection
# capability is lost to volume, not to skill. The published SOC-
# effectiveness literature (Mandiant M-Trends, IBM X-Force, Verizon
# DBIR, ESG SOC modernization surveys) consistently reports a
# 50–80% drop in true-positive rates under sustained queue
# saturation; the `saturated_detection_factor = 0.3` value below
# sits in the middle of that range.
#
# Parameters are aggregate statistical descriptors derived from
# publicly available sources:
#
#   - Mandiant M-Trends (median dwell time, MTTD distribution)
#   - IBM X-Force Threat Intelligence Index (alert-volume metrics)
#   - Verizon DBIR (intrusion phase progression)
#   - ESG / Ponemon SOC surveys (analyst throughput, ticket capacity)
#   - CISA / NIST SP 800-61 (incident response process timing)
#
# No specific operational tooling is modeled; all values are aggregate
# statistical descriptors expected to be sourceable from open
# literature. The scenario is descriptive, not prescriptive.

attacker_budget = 250_000.0
defender_budget = 50_000_000.0

[meta]
schema_version = 1
name = "Alert Fatigue — SOC Capacity Saturation Wargame"
description = "Multi-phase intrusion campaign that exploits a finite-throughput SOC. The attacker's enumeration phase floods the tier-1 alert queue, suppressing detection of the credential-harvest and lateral-movement phases the defender would otherwise have caught. Quantifies how much true-positive rate the defender loses to volume saturation — Epic K's canonical archetype for the new defender-capacity primitive."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["soc", "alert-fatigue", "defender-capacity", "epic-k", "intrusion"]
confidence = "Medium"

