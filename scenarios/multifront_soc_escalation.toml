# ============================================================================
# Kill Chain — sustained multi-phase intrusion
# ============================================================================

[kill_chains.cascading_intrusion]
id = "cascading_intrusion"
name = "Cascading Intrusion Against 3-Tier SOC"
description = "Multi-phase intrusion that pushes the defender's escalation chain end-to-end. Each phase emits noise on a different tier so the analyst can observe how the overflow chain redistributes load: tier-1 saturates first, escalates to tier-2; tier-2 saturates next, escalates to tier-3; tier-3 (terminal) absorbs the residual."
attacker = "red_intrusion"
target = "blue_soc"
entry_phase = "noisy_enumeration"

# -- Phase 1: noisy enumeration (loads tier-1 hard) -------------------------

[kill_chains.cascading_intrusion.phases.noisy_enumeration]
id = "noisy_enumeration"
name = "Noisy External Enumeration"
description = "External scanning and credential spraying. ~70 alerts/tick into tier-1 — well above tier-1's 12/tick service rate, well above the 80% escalation threshold. The overflow chain begins routing alerts to tier-2 within a few ticks, so the defender never gets the full alert-fatigue effect on tier-1; instead, the load propagates."
base_success_probability = 0.95
min_duration = 6
max_duration = 12
detection_probability_per_tick = 0.10
prerequisite_success_boost = 0.0
attribution_difficulty = 0.85
targets_domains = ["NetworkSecurity"]

[kill_chains.cascading_intrusion.phases.noisy_enumeration.cost]
attacker_dollars = 5_000.0
defender_dollars = 800_000.0
attacker_resources = 1.0

[[kill_chains.cascading_intrusion.phases.noisy_enumeration.defender_noise]]
defender = "blue_soc"
role = "tier1_alerts"
items_per_tick = 70.0

[[kill_chains.cascading_intrusion.phases.noisy_enumeration.outputs]]
type = "IntelligenceGain"
amount = 0.10

[[kill_chains.cascading_intrusion.phases.noisy_enumeration.branches]]
condition = { type = "OnSuccess" }
next_phase = "credential_harvest"

[[kill_chains.cascading_intrusion.phases.noisy_enumeration.branches]]
condition = { type = "OnDetection" }
next_phase = "credential_harvest"

# -- Phase 2: credential harvest (sustains tier-1 load) ---------------------

[kill_chains.cascading_intrusion.phases.credential_harvest]
id = "credential_harvest"
name = "Credential Harvest via Phishing"
description = "Phishing against privileged accounts. Continues pushing 5 alerts/tick into tier-1 to keep the escalation chain primed. Detection is gated by tier-1 — the saturation factor still applies because tier-1's depth, even after escalating to tier-2, sits at or above the 80% threshold."
prerequisites = ["noisy_enumeration"]
base_success_probability = 0.70
min_duration = 4
max_duration = 9
detection_probability_per_tick = 0.08
prerequisite_success_boost = 0.05
attribution_difficulty = 0.80
targets_domains = ["NetworkSecurity", "InsiderThreat"]
gated_by_defender = { faction = "blue_soc", role = "tier1_alerts" }

[kill_chains.cascading_intrusion.phases.credential_harvest.cost]
