# Multi-Front Resource Contention — SOC Escalation Cascade
#
# Demonstrates the Epic D round-three item 3 multi-front mechanic:
# defender capacity is no longer a per-role silo. When tier-1 alert
# triage saturates, additional incoming work spills to tier-2
# intrusion analysis (a smaller, slower cell). When tier-2 itself
# saturates, work spills further to a tier-3 forensics escalation
# cell. Models the standard SOC escalation policy: "if tier-N is
# at capacity, push the alert up the chain."
#
# Where the Epic K alert-fatigue scenario asks "what does saturation
# cost you?", this scenario asks "what does the escalation policy
# cost you?" The defender's tier-1 still saturates, but instead of
# alerts ageing in the tier-1 backlog, they get pushed up the chain
# — at which point tier-2's smaller capacity saturates, and the
# fatigue effect that would have hit tier-1 detection rolls now hits
# tier-2 detection rolls (which gate the higher-leverage exfiltration
# phase). The MC distribution surfaces how the cascade redistributes
# detection suppression across the chain.
#
# Parameters are aggregate statistical descriptors derived from
# publicly available sources:
#
#   - Mandiant M-Trends (median dwell time, MTTD distribution)
#   - IBM X-Force Threat Intelligence Index (alert-volume metrics)
#   - Verizon DBIR (intrusion phase progression)
#   - ESG / Ponemon SOC surveys (analyst throughput, ticket capacity)
#   - SANS DFIR Survey (forensic team sizing, escalation cadence)
#   - CISA / NIST SP 800-61 (incident response process timing,
#     escalation policy templates)
#
# No specific operational tooling is modeled; all values are
# aggregate statistical descriptors expected to be sourceable from
# open literature. The scenario is descriptive, not prescriptive.

attacker_budget = 300_000.0
defender_budget = 80_000_000.0

[meta]
schema_version = 1
name = "Multi-Front Resource Contention — SOC Escalation Cascade"
description = "Three-tier SOC defender (tier-1 triage → tier-2 IR → tier-3 forensics) with declared escalation policy. A sustained multi-phase intrusion saturates tier-1 within the first dozen ticks; the overflow chain pushes work up to tier-2, which itself saturates, which pushes residual to tier-3. Demonstrates how a declarative escalation policy redistributes detection-suppression pressure across the chain rather than concentrating it on tier-1."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["soc", "alert-fatigue", "multi-front", "escalation", "epic-d", "defender-capacity"]
confidence = "Medium"

