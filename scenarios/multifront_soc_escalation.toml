[factions.blue_soc.forces.soc_analysts]
id = "soc_analysts"
name = "SOC Analyst Pool"
unit_type = "CyberUnit"
region = "enterprise_core"
strength = 80.0
mobility = 0.0
upkeep = 8.0
morale_modifier = 0.0
capabilities = []

# Tier-1 alert triage. Capacity 80 with overflow_to = tier-2 means:
# arrivals up to 80% of capacity stay on tier-1 and run through the
# normal Backlog policy; arrivals past that escalate directly to
# tier-2. The 0.8 threshold matches the typical "escalate at 80%
# load" policy described in NIST SP 800-61 IR templates and ESG SOC
# surveys.
[factions.blue_soc.defender_capacities.tier1_alerts]
id = "tier1_alerts"
name = "Tier-1 Alert Triage"
description = "Initial alert pipeline. Saturates fast under volume; declared overflow policy pushes excess to tier-2 IR rather than letting alerts age in queue. Saturated detection factor is the published 50–80% drop in true-positive rate under load — sits at the lower end of the range here because the escalation chain is meant to relieve some of the pressure."
queue_depth = 80
service_rate = 12.0
overflow = "Backlog"
saturated_detection_factor = 0.35
overflow_to = "tier2_intrusion"
overflow_threshold = 0.8

# Tier-2 intrusion analysts. Smaller capacity, slower service rate
# (deeper investigation per ticket). Escalates to tier-3 forensics
# at 70% load — IR teams typically escalate sooner than triage
# because forensic investigation is slow and queues build fast.
[factions.blue_soc.defender_capacities.tier2_intrusion]
id = "tier2_intrusion"
name = "Tier-2 Intrusion Analysis"
description = "Forensic investigation cell. Receives escalated tier-1 work plus directly-routed deeper signals. Smaller capacity matches the published median IR-team size for a mid-sized enterprise (5–10 analysts); lower service rate captures the deeper analytic effort each incident requires. Escalates persistent backlog to tier-3 forensics."
queue_depth = 12
service_rate = 1.5
overflow = "Backlog"
saturated_detection_factor = 0.45
overflow_to = "tier3_forensics"
overflow_threshold = 0.7

# Tier-3 forensics escalation cell. Smallest queue, slowest service.
# Terminal node in the escalation chain — no overflow_to, so any
# further saturation builds in the tier-3 backlog.
[factions.blue_soc.defender_capacities.tier3_forensics]
id = "tier3_forensics"
name = "Tier-3 Forensic Escalation"
description = "Senior forensic / threat-hunting cell. Terminal escalation node — no further overflow target. Small capacity reflects the typical staffing (2–4 senior analysts) for a mid-sized enterprise's senior IR / forensics function (SANS DFIR Survey)."
queue_depth = 5
service_rate = 0.5
overflow = "Backlog"
saturated_detection_factor = 0.50

