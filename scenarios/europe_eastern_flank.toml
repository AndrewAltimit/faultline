delta = -0.2

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "CoercionPressure"
delta = 0.3

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "PoliticalCost"
delta = 0.25

attacker_budget = 400000.0
defender_budget = 60000000.0

