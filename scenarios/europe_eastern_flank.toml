# -- Covert Kill Chain (Phase 6.1) -----------------------------------------

[kill_chains.infra_sabotage]
id = "infra_sabotage"
name = "Infrastructure Sabotage Chain"
description = "Reconnaissance → emplacement → cyber prepositioning → coordinated strike"
attacker = "russia"
target = "ukraine_coalition"
entry_phase = "sigint_recon"

[kill_chains.infra_sabotage.phases.sigint_recon]
id = "sigint_recon"
name = "SIGINT Reconnaissance"
description = "Passive collection of Ukrainian C2 signals over staging belt"
prerequisites = []
base_success_probability = 0.9
min_duration = 15
max_duration = 25
detection_probability_per_tick = 0.006
prerequisite_success_boost = 0.0
attribution_difficulty = 0.88
targets_domains = ["SignalsIntelligence", "NetworkSecurity"]

[kill_chains.infra_sabotage.phases.sigint_recon.cost]
attacker_dollars = 12000.0
defender_dollars = 900000.0
attacker_resources = 6.0

[[kill_chains.infra_sabotage.phases.sigint_recon.outputs]]
type = "IntelligenceGain"
amount = 0.2

[[kill_chains.infra_sabotage.phases.sigint_recon.branches]]
next_phase = "cyber_preposition"
[kill_chains.infra_sabotage.phases.sigint_recon.branches.condition]
type = "OnSuccess"

[kill_chains.infra_sabotage.phases.cyber_preposition]
id = "cyber_preposition"
name = "Cyber Prepositioning"
description = "Persistent access in Ukrainian telecoms and grid SCADA"
prerequisites = ["sigint_recon"]
base_success_probability = 0.55
min_duration = 20
max_duration = 40
detection_probability_per_tick = 0.015
prerequisite_success_boost = 0.1
attribution_difficulty = 0.7
targets_domains = ["NetworkSecurity", "InsiderThreat", "SupplyChainSecurity"]

[kill_chains.infra_sabotage.phases.cyber_preposition.cost]
attacker_dollars = 80000.0
defender_dollars = 6500000.0
attacker_resources = 12.0

[[kill_chains.infra_sabotage.phases.cyber_preposition.outputs]]
type = "IntelligenceGain"
amount = 0.25

[[kill_chains.infra_sabotage.phases.cyber_preposition.outputs]]
type = "InstitutionalErosion"
delta = 0.05

[[kill_chains.infra_sabotage.phases.cyber_preposition.branches]]
next_phase = "coordinated_strike"
[kill_chains.infra_sabotage.phases.cyber_preposition.branches.condition]
type = "OnSuccess"

[kill_chains.infra_sabotage.phases.coordinated_strike]
id = "coordinated_strike"
name = "Coordinated Kinetic + Cyber Strike"
description = "Paired missile + cyber attack on power grid, telecoms, and Kyiv C2"
prerequisites = ["cyber_preposition"]
base_success_probability = 0.45
min_duration = 2
max_duration = 4
detection_probability_per_tick = 0.7
prerequisite_success_boost = 0.2
attribution_difficulty = 0.2
targets_domains = ["PhysicalSecurity", "NetworkSecurity", "CivilianEmergency"]

[kill_chains.infra_sabotage.phases.coordinated_strike.cost]
attacker_dollars = 250000.0
defender_dollars = 45000000.0
attacker_resources = 30.0

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "InfraDamage"
region = "ukraine"
factor = 0.7

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "InfraDamage"
region = "central_europe"
factor = 0.2

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "TensionDelta"
delta = 0.2

[[kill_chains.infra_sabotage.phases.coordinated_strike.outputs]]
type = "MoraleDelta"
