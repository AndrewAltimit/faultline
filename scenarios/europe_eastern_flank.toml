# Europe — Eastern Flank
#
# Multi-faction conflict along NATO's eastern flank: Russian Federation
# vs NATO coalition with Ukraine as the contested region. Models
# regional control, coalition cohesion, and a covert kill chain
# targeting critical infrastructure via a multi-phase kill chain.
#
# All parameters are aggregate statistical descriptors derived from
# publicly reported force structures (IISS Military Balance 2025) and
# public analyses of the 2022+ conflict trajectory. No classified or
# export-controlled information.

[meta]
schema_version = 1
name = "Europe — Eastern Flank"
description = """
NATO coalition vs Russian Federation with Ukraine as the contested
pivot. Demonstrates the bundled Europe map library plus a four-phase
covert infrastructure kill chain.
"""
author = "AI Agent Bot"
version = "0.1.0"
tags = ["europe", "nato", "russia", "ukraine", "kill-chain", "phase-6"]

