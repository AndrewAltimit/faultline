# Strategy Search Demo (Epic H)
#
# Minimal scenario for exercising the `--search` strategy-search mode
# end-to-end inside CI. Two symmetric factions on a 4-region grid;
# both factions' `initial_morale` is declared as a decision variable
# so a 3×3 grid search produces 9 deterministic trials in <1s.
#
# **Smoke-test scenario, not an analytical example.** Because the two
# factions are perfectly symmetric in force structure and terrain, no
# combination of starting morale alone is enough to trigger either
# `MilitaryDominance` victory condition before `max_ticks`. Every
# trial is therefore expected to produce a stalemate (win rate 0.0,
# duration == max_ticks) — what the scenario *demonstrates* is that
# the `--search` machinery runs deterministically end-to-end, that
# the bundled manifest replays bit-identically via `--verify`, and
# that the canonical TOML round-trips cleanly through
# `verify-bundled-scenarios.sh` and `verify-migration.sh`. Real
# analytical scenarios should tune force / terrain / event structure
# so the declared decision variables actually move the objectives.
#
# CLI:
#   cargo run -p faultline-cli -- scenarios/strategy_search_demo.toml \
#     --search --search-trials 9 --search-runs 50 \
#     --search-method grid \
#     --search-objective maximize_win_rate:alpha \
#     --search-objective minimize_duration
#
# All capability parameters are notional and chosen for fast convergence
# inside the CI verify-bundled pipeline. This is a *purely synthetic*
# scenario; no historical analogue.

[meta]
schema_version = 1
name = "Strategy Search Demo"
description = """
Two equal factions on a 2x2 grid, with both factions' starting morale
declared as decision variables. Demonstrates the round-one strategy
search layer: random + grid sampling, multi-objective Pareto frontier,
search-only RNG independent of the inner Monte Carlo seed.
"""
author = "AndrewAltimit"
version = "0.1.0"
tags = ["search", "epic-h", "synthetic"]
confidence = "Low"

[map]
[map.source]
type = "Grid"
width = 2
height = 2

[map.regions.north_west]
id = "north_west"
name = "North-West"
population = 500000
urbanization = 0.5
initial_control = "alpha"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.regions.north_east]
id = "north_east"
name = "North-East"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_west]
id = "south_west"
name = "South-West"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_east]
id = "south_east"
name = "South-East"
population = 500000
urbanization = 0.5
initial_control = "bravo"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.infrastructure]

[[map.terrain]]
region = "north_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "north_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

