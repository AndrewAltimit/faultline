# -- Strategy Search Space (Epic H) -----------------------------------------
#
# Decision variables: each faction's initial morale floats on a small
# range so a `grid` search with a 2-step grid produces a 4-cell
# Cartesian product (2 × 2). The objectives are surfaced as defaults so
# `--search` works without `--search-objective` flags; CLI flags can
# still override.

[strategy_space]

[[strategy_space.variables]]
path = "faction.alpha.initial_morale"
owner = "alpha"

[strategy_space.variables.domain]
kind = "continuous"
low = 0.4
high = 0.95
steps = 3

[[strategy_space.variables]]
path = "faction.bravo.initial_morale"
owner = "bravo"

[strategy_space.variables.domain]
kind = "continuous"
low = 0.4
high = 0.95
steps = 3

[[strategy_space.objectives]]
metric = "maximize_win_rate"
faction = "alpha"

[[strategy_space.objectives]]
metric = "minimize_duration"
