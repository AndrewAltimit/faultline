# Calibration demo (Epic N scaffold)
#
# An asymmetric short-duration inter-state conflict. Demonstrates the
# `[meta.historical_analogue]` mechanism end-to-end: the scenario
# declares observations from a documented precedent, and the report's
# `## Calibration` section reports a per-observation verdict against the
# Monte Carlo distribution.
#
# Scope caveat — this scenario uses a *stylized aggregate* analogue
# (statistical patterns from a reference set of similar short conflicts)
# rather than a single named historical event. That keeps the wiring
# illustrative without forcing the analyst to chase down whether the
# specific casualty / duration figures for a single named conflict are
# defensible. Filling in scenarios with cleanly-sourced single-event
# analogues is an Epic N follow-up.
#
# Expected verdicts on this scenario as currently configured:
#
# - `winner = stronger_state`: **Fail** — the basic engine attrition
#   configuration on this map does not produce a decisive victor in the
#   30-day horizon, so every MC run terminates as stalemate.
# - `win_rate(stronger_state) ∈ [70%, 95%]`: **Fail** — same reason.
# - `duration_ticks ∈ [3, 14]`: **Fail** — the engine reaches max_ticks
#   on every run and the duration distribution is concentrated at 30.
# - `duration_ticks ∈ [1, 100]`: **Pass** — wide interval covering the
#   max_ticks cap; demonstrates the verdict ladder's positive case.
#
# Three Fail verdicts + one Pass is *intentional* and illustrates
# exactly the diagnostic value Epic N exists to provide: the analyst
# sees that the scenario, as configured, does not reproduce the
# analogue. The next iteration is for a follow-up — either tune the
# scenario parameters until the verdict turns Pass, or revise the
# analogue to match what the engine actually models. Either response
# is legitimate; the calibration verdict makes the gap visible instead
# of leaving it implicit.
#
# Sources are intentionally generic OSINT references — the grep-guard
# CI step blocks coupling to any specific external publication series.

[meta]
schema_version = 1
name = "Calibration Demo — Asymmetric Short Conflict"
description = """
A scaffold scenario demonstrating Epic N's calibration mechanism. Two
factions: a stronger state (3x force ratio) and a weaker state. Conflict
should resolve quickly in favor of the stronger side; the Monte Carlo
output is calibrated against a stylized aggregate analogue of short
asymmetric inter-state conflicts.
"""
author = "AndrewAltimit"
version = "0.1.0"
tags = ["demo", "calibration", "asymmetric", "inter-state"]
confidence = "Low"

[meta.historical_analogue]
name = "Stylized aggregate — short asymmetric inter-state conflicts"
description = """
A stylized aggregate analogue, not a single named event. Calibrates
against the statistical pattern observed across published references on
short conventional inter-state conflicts where one side holds a 3-5x
conventional force advantage. The scenario should reproduce both the
typical outcome (stronger side prevails) and the typical duration
(short — days, not months).
"""
period = "Late-20th and early-21st-century reference set"
sources = [
    "IISS Military Balance (annual)",
    "RAND aggregate analyses on inter-state conflict outcomes",
    "Congressional Research Service (CRS) reports on regional conflicts",
]
confidence = "Low"

[[meta.historical_analogue.observations]]
notes = "stronger side has decisive advantage in asymmetric short wars"
confidence = "Medium"
[meta.historical_analogue.observations.metric]
kind = "winner"
faction = "stronger_state"

[[meta.historical_analogue.observations]]
notes = "stronger-side win rate across reference set ~ 70-90%"
confidence = "Low"
[meta.historical_analogue.observations.metric]
kind = "win_rate"
faction = "stronger_state"
low = 0.70
high = 0.95

[[meta.historical_analogue.observations]]
notes = "active operations typically resolve in days, not weeks"
confidence = "Medium"
[meta.historical_analogue.observations.metric]
kind = "duration_ticks"
low = 3
high = 14

# A wide-interval observation that the engine's stalemate-at-cap
# behavior will satisfy. Demonstrates the `Pass` end of the verdict
# ladder alongside the three `Fail` observations above. Authors with
# fully-tuned scenarios would not need this trivial check; it's
# included here to keep the demo's calibration table from looking like
# the verdict ladder is broken.
[[meta.historical_analogue.observations]]
notes = "loose duration band, expected Pass"
confidence = "Low"
[meta.historical_analogue.observations.metric]
kind = "duration_ticks"
low = 1
high = 100

