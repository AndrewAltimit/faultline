# -- Simulation Config ------------------------------------------------------
#
# Short horizon — the analogue says these resolve quickly. A 30-tick
# (30-day) cap is a comfortable headroom; runs that hit the cap without
# resolution count as stalemate and pull the calibration verdict toward
# Marginal/Fail, which is the desired diagnostic if the model is
# under-resolving.

[simulation]
max_ticks = 30
monte_carlo_runs = 100
fog_of_war = false
snapshot_interval = 5
seed = 42

[simulation.tick_duration]
Days = 1

[simulation.attrition_model]
Stochastic = { noise = 0.15 }

# -- Victory Conditions -----------------------------------------------------

[victory_conditions.stronger_dominance]
id = "stronger_dominance"
name = "Stronger State Dominance"
faction = "stronger_state"

[victory_conditions.stronger_dominance.condition]
type = "MilitaryDominance"
enemy_strength_below = 5.0

[victory_conditions.weaker_survival]
id = "weaker_survival"
name = "Weaker State Strategic Control"
faction = "weaker_state"

[victory_conditions.weaker_survival.condition]
type = "StrategicControl"
threshold = 0.75
