# Autonomous Drone Swarm Destabilization Scenario
#
# Models a multi-phase covert destabilization campaign using autonomous
# drone swarms against US government institutions. Drawn from open-source
# threat-assessment literature analyzing how non-state actors can
# leverage commercially-derived drone technology to undermine political
# stability through compound kill chains.
#
# This scenario models an intelligence-led compound kill chain: a
# campaign progressing through sensor emplacement, wireless exploitation,
# credential harvesting, persistent surveillance, and culminating in
# either a coercion campaign or executive decapitation attempt.
#
# References (open-source, OSINT-only):
# - RAND RR-3023-DHS: "Small Unmanned Aerial System Adversary Capabilities" (2020)
# - IISS Military Balance 2025: C-UAS system capabilities and deployment data
# - CISA: Counter-UAS gap assessments and interagency coordination reports
# - Kallenborn, Z. (2021): "Are Drone Swarms Weapons of Mass Destruction?" Parameters
# - Scharre, P. (2018): "Army of None" — autonomous weapons proliferation analysis
# - DarkHotel APT campaign analysis (Kaspersky, 2014) — strategic logic of off-site exploitation
# - Ukraine conflict OSINT (2022-present): commercial drone weaponization techniques

[meta]
schema_version = 1
name = "Drone Swarm Destabilization Campaign"
description = "Multi-phase autonomous drone swarm campaign against US government institutions. Models compound kill chain from covert sensor emplacement through credential exploitation to coercion or kinetic action."
author = "faultline-ai"
version = "0.1.0"
tags = ["drone-swarm", "asymmetric", "cyber-physical", "kill-chain", "domestic", "180-day"]

