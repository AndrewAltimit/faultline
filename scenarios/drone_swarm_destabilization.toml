# The scenario focuses on the DC metro area as the primary operational
# theater, with secondary operational reach into surrounding regions.
# Regions represent operational domains rather than pure geography.

[map]

[map.source]
type = "Grid"
width = 4
height = 2

# The Capital Core — seat of federal power, highest security concentration.
# Executive offices, congressional buildings, Supreme Court, agency HQs.
# Population: government workforce + residents within security perimeters.
[map.regions.capital_core]
id = "capital_core"
name = "Capital Core (DC)"
population = 700_000
urbanization = 0.98
initial_control = "federal_security"
strategic_value = 10.0
borders = ["northern_virginia", "maryland_suburbs", "federal_facilities"]

# Northern Virginia — defense/intel community concentration.
# Pentagon, CIA (Langley), NRO, DISA, defense contractors.
# Where senior officials live and commute from.
