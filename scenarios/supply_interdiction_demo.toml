# ============================================================================
# Networks (Epic L topology + Epic D round-three supply contract)
# ============================================================================

# Blue's primary supply chain: depot → junction → forward base.
# Three edges (sum baseline = 240). Severing the d_jct edge cuts
# residual to 80 (~33% of baseline).
[networks.primary_supply]
id = "primary_supply"
name = "Blue Primary Supply Chain"
description = "Main rail-and-road logistics corridor. Total baseline capacity 240/tick."
kind = "supply"
owner = "blue"

[networks.primary_supply.nodes.depot_n]
id = "depot_n"
name = "Northern Depot"
region = "theatre_north"
criticality = 1.0

[networks.primary_supply.nodes.junction_n]
id = "junction_n"
name = "Northern Junction"
region = "theatre_north"
criticality = 0.85

[networks.primary_supply.nodes.fwd_n]
id = "fwd_n"
name = "Forward Base North"
region = "theatre_north"
criticality = 0.9

[networks.primary_supply.edges.depot_to_jct]
id = "depot_to_jct"
from = "depot_n"
to = "junction_n"
capacity = 100.0
latency = 1.0
bandwidth = 100.0
trust = 0.9

[networks.primary_supply.edges.jct_to_fwd]
id = "jct_to_fwd"
from = "junction_n"
to = "fwd_n"
capacity = 80.0
latency = 1.0
bandwidth = 80.0
trust = 0.9

[networks.primary_supply.edges.depot_to_fwd]
id = "depot_to_fwd"
from = "depot_n"
to = "fwd_n"
capacity = 60.0
latency = 2.0
bandwidth = 60.0
trust = 0.85

# Blue's secondary supply chain: smaller, single-edge backup. Baseline
# 80; severing this is the second hit of the campaign.
[networks.backup_supply]
id = "backup_supply"
name = "Blue Backup Supply Chain"
description = "Redundant air-bridge route. Baseline 80/tick — meant to compensate when primary is interdicted."
kind = "supply"
owner = "blue"

[networks.backup_supply.nodes.depot_s]
id = "depot_s"
name = "Southern Depot"
region = "theatre_south"
criticality = 1.0

[networks.backup_supply.nodes.fwd_s]
id = "fwd_s"
name = "Forward Base South"
region = "theatre_south"
criticality = 0.9

[networks.backup_supply.edges.air_bridge]
id = "air_bridge"
from = "depot_s"
to = "fwd_s"
capacity = 80.0
latency = 1.0
bandwidth = 80.0
trust = 0.85

# ============================================================================
# Events (scripted interdiction sequence)
# ============================================================================

# Tick 4: primary supply junction-to-fwd edge knocked to 0.25× capacity.
# Drops residual on primary_supply from 240 → 100 + 20 + 60 = 180,
# pressure ratio ≈ 0.75. Backup still intact (1.0). Blue pressure = 0.75.
[events.cut_primary]
id = "cut_primary"
name = "Primary Supply Interdiction"
description = "Adversary partisan / drone strike degrades the junction-to-forward route on the primary supply chain."
earliest_tick = 4
latest_tick = 4
probability = 1.0
repeatable = false

[[events.cut_primary.conditions]]
condition = "TickAtLeast"
tick = 4

[[events.cut_primary.effects]]
effect = "NetworkEdgeCapacity"
network = "primary_supply"
edge = "jct_to_fwd"
factor = 0.25

# Tick 8: backup supply air bridge cut to 0.4× capacity. Residual on
# backup_supply drops from 80 → 32, ratio = 0.4. Pressure = 0.75 × 0.4
# = 0.30. Blue's income falls to 30% of baseline.
[events.cut_backup]
id = "cut_backup"
name = "Backup Supply Disruption"
description = "Adversary deploys SAM coverage that constrains the air bridge to 40% of pre-strike throughput."
earliest_tick = 8
latest_tick = 8
probability = 1.0
repeatable = false

[[events.cut_backup.conditions]]
condition = "TickAtLeast"
tick = 8

[[events.cut_backup.effects]]
effect = "NetworkEdgeCapacity"
network = "backup_supply"
edge = "air_bridge"
factor = 0.4

# Tick 12: depot_n disrupted entirely. Severs every primary_supply
# edge incident to it (depot_to_jct + depot_to_fwd → 0). Residual on
# primary_supply = 0 + 80 + 0 = 80, pressure ratio = 80 / 240 ≈ 0.333
# (already attenuated jct_to_fwd at 0.25 means 80 * 0.25 = 20, so
# really pressure = 20 / 240 ≈ 0.083). Combined with backup at 0.4 →
# Blue pressure ≈ 0.033. Income near zero — units degrade.
[events.disrupt_depot]
id = "disrupt_depot"
name = "Northern Depot Disruption"
description = "Adversary kinetic strike disables Blue's northern depot for the remainder of the run."
earliest_tick = 12
latest_tick = 12
probability = 1.0
repeatable = false

[[events.disrupt_depot.conditions]]
condition = "TickAtLeast"
tick = 12

[[events.disrupt_depot.effects]]
effect = "NetworkNodeDisrupt"
network = "primary_supply"
node = "depot_n"

