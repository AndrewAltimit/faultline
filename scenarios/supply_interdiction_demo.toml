# Supply Interdiction — Resource-Pressure Wargame
#
# Demonstrates Epic D round-three item 2: the engine's supply-network
# interdiction phase. A defender (`blue`) operates a four-edge logistics
# graph feeding two forward bases. A scripted attacker chains three
# events that progressively cut Blue's supply capacity — the report's
# `## Supply Pressure` section quantifies the resulting income drag
# directly, separate from the resilience-curve analysis the Epic L
# `## Network Resilience` section already provides.
#
# The contract this scenario exercises:
# - `kind = "supply"` networks with a declared `owner` propagate
#   capacity loss into per-tick income attenuation. Pressure is
#   `residual / baseline` capacity, clamped to `[0, 1]`, multiplied
#   into the owner's `resource_rate` each tick.
# - Multiple owned supply networks compose multiplicatively.
# - Upkeep is *not* attenuated, so cut supply lines starve the
#   faction's resource pool over time.
#
# The analytical purpose is to make supply-line vulnerability
# observable as a falling resource curve rather than only as a graph-
# fragmentation artifact. Authors with logistics-resilience questions
# can substitute their own topology.
#
# Parameters are aggregate statistical descriptors derivable from open
# sources (DoD logistics studies, CRS reports on theatre logistics).
# No specific operational tooling or infrastructure is modeled.

attacker_budget = 5_000_000.0
defender_budget = 50_000_000.0

[meta]
schema_version = 1
name = "Supply Interdiction — Resource-Pressure Wargame"
description = "Two-network defender (primary + secondary supply chain) under scripted interdiction. Demonstrates the Epic D round-three supply phase: per-tick income attenuation in proportion to remaining supply-network capacity. Pairs with Epic L's network primitives — observe both the resilience curve (Network Resilience section) and the resulting income drag (Supply Pressure section)."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["networks", "supply", "interdiction", "epic-d", "epic-l", "resource-pressure"]
confidence = "Medium"

