# Drone Threat Capabilities Demo
#
# Sandbox scenario demonstrating the Drone Threat Library tech cards.
# All capabilities are aggregate statistical effects derived from
# publicly available open-source intelligence (IISS Military Balance,
# congressional testimony, academic literature, and open-source UAS /
# counter-UAS threat-assessment writing). No classified or
# export-controlled information is encoded.
#
# This scenario is intentionally abstract — its purpose is to give
# every faction access to the full tech library so you can experiment
# with how offensive and defensive cards interact. For realistic
# scenarios, copy individual cards into your own scenario via the
# Tech Cards panel in the browser simulator.

[meta]
schema_version = 1
name = "Drone Threat Capabilities Demo"
description = """
Two-faction sandbox wired with every tech card in the bundled Drone
Threat Library. Use it to probe how offensive capabilities (autonomous
swarms, rogue-AP perching, covert sensor emplacement) interact with
defensive investments (multi-phenomenology C-UAS, HPM, WIDS fusion,
rooftop inspection, MDM enforcement).
"""
author = "AI Agent Bot"
version = "0.1.0"
tags = ["demo", "tech-cards", "drone-threat"]

# -- Map --------------------------------------------------------------------

[map]
[map.source]
type = "Grid"
width = 2
height = 2

[map.regions.attacker_base]
