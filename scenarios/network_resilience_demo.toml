# Network Resilience — Multi-Network Interdiction Wargame
#
# Demonstrates the Epic L network primitive: a defender with two
# interdependent networks (a logistics graph and a comms graph) faces a
# scripted attacker who scripts disruption events against the comms
# layer before scripted interdiction of the logistics layer. The
# resulting [`NetworkSummary`] surfaces the resilience curve, the
# critical-node ranking by Brandes betweenness, and the fragmentation
# rate across runs.
#
# The analytical purpose is to make networked failure modes
# (single-points-of-failure, cascading degradation) directly observable
# in a Faultline run rather than implicitly modeled via region control.
# Authors with supply-chain or comms-disruption questions can substitute
# their own topology while keeping the event scaffolding.
#
# Parameters are aggregate statistical descriptors derivable from open
# sources (DoD logistics studies, public comms-resilience analyses, RAND
# Civil Reserve Air Fleet reports). No specific operational tooling or
# infrastructure is modeled.

attacker_budget = 5_000_000.0
defender_budget = 50_000_000.0

[meta]
schema_version = 1
name = "Network Resilience — Multi-Network Interdiction Wargame"
description = "Two-network defender (supply + comms) under scripted interdiction. Demonstrates the Epic L network primitive — typed graphs, interdiction / disruption / infiltration events, Brandes critical-node ranking, and per-run resilience curves — without relying on any specific operational system."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["networks", "resilience", "interdiction", "epic-l", "supply-chain", "comms"]
confidence = "Medium"

