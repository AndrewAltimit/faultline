# ============================================================================
# Networks (Epic L)
# ============================================================================

# Blue's logistics graph: a depot --> two forward bases pattern with a
# secondary depot for resilience. The "fwd_west" base depends on edges
# from both depots; severing depot1 -> fwd_west forces flow through the
# longer depot2 -> fwd_west route.
[networks.logistics]
id = "logistics"
name = "Blue Logistics Network"
description = "Two depots feeding two forward bases via a small backbone. Models the contested-corridor logistics typical of forward-deployed forces."
kind = "supply"
owner = "blue"

[networks.logistics.nodes.depot1]
id = "depot1"
name = "Primary Depot"
region = "theatre_east"
criticality = 1.0

[networks.logistics.nodes.depot2]
id = "depot2"
name = "Secondary Depot"
region = "theatre_east"
criticality = 0.7

[networks.logistics.nodes.junction]
