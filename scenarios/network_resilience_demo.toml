# ============================================================================
# Events (scripted)
# ============================================================================

# Tick 4: comms hub disrupted. Fragments comms — relay-only routing
# remains for fwd_west_post via relay_west; fwd_east_post is isolated.
[events.comms_hub_strike]
id = "comms_hub_strike"
name = "Comms Hub Strike"
description = "Adversary kinetic strike disrupts the central comms hub."
earliest_tick = 4
latest_tick = 4
probability = 1.0
repeatable = false

[[events.comms_hub_strike.conditions]]
condition = "TickAtLeast"
tick = 4

[[events.comms_hub_strike.effects]]
effect = "NetworkNodeDisrupt"
network = "comms"
node = "hub"

# Tick 6: primary depot --> western forward base interdicted. The
# depot1 --> junction edge factor drops to 0.2 (interdiction is
# partial; flow continues at 20% under heavy escort).
[events.logistics_interdict]
id = "logistics_interdict"
name = "Logistics Interdiction"
description = "Adversary partisans / drone strikes degrade the primary depot's western corridor."
earliest_tick = 6
latest_tick = 6
probability = 1.0
repeatable = false

[[events.logistics_interdict.conditions]]
condition = "TickAtLeast"
tick = 6

[[events.logistics_interdict.effects]]
effect = "NetworkEdgeCapacity"
network = "logistics"
edge = "d1_jct"
factor = 0.2

# Tick 8: depot2 infiltrated by red. Models OPSEC failure on the
# resilience-backup depot — once detected by Blue it would be a
# scenario-author counterfactual, but the analytic value is in
# observing that Blue's "fallback" depot is no longer trusted ground.
[events.depot2_infiltrate]
id = "depot2_infiltrate"
name = "Secondary Depot Infiltration"
description = "Red HUMINT element penetrates Blue's secondary depot perimeter; raises Red visibility into Blue logistics."
earliest_tick = 8
latest_tick = 8
probability = 1.0
repeatable = false

[[events.depot2_infiltrate.conditions]]
condition = "TickAtLeast"
tick = 8

[[events.depot2_infiltrate.effects]]
effect = "NetworkInfiltrate"
network = "logistics"
node = "depot2"
faction = "red"

