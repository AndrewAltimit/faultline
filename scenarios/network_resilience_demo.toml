name = "Theatre Junction"
region = "theatre_west"
criticality = 0.85

[networks.logistics.nodes.fwd_west]
id = "fwd_west"
name = "Forward Base West"
region = "theatre_west"
criticality = 0.9

[networks.logistics.nodes.fwd_east]
id = "fwd_east"
name = "Forward Base East"
region = "theatre_east"
criticality = 0.9

[networks.logistics.edges.d1_jct]
