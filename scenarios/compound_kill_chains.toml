# Compound Kill Chain Scenario — Research Simulation
#
# Defensive-planning wargame. Exercises the `[kill_chains]`
# schema with three concurrent multi-phase campaigns modeled against a
# notional integrated federal security posture. The scenario is a tool
# for red-teaming C-UAS / cyber / physical-security integration gaps —
# its purpose is to help defenders quantify where their layered posture
# under-performs, not to operationalize any particular tradecraft.
#
# The three campaigns represent archetypal adversary behaviors that
# recur across published incident retrospectives and open-source threat
# modeling literature:
#
#   - Campaign Alpha: low-visibility intelligence-led pressure campaign
#     (passive sensing → wireless environment mapping → credential
#     harvest → disclosure-driven political pressure).
#
#   - Campaign Bravo: proof-of-capability demonstration (non-lethal
#     autonomous swarm penetration of a permissive-airspace public event
#     to invalidate the defender's capability narrative).
#
#   - Campaign Charlie: cyber-physical convergence (drone-delivered
#     rogue-AP relay into an ICS/SCADA environment at a regional
#     utility, paired with a simultaneous inert physical demonstration
#     that consumes defender attention).
#
# All durations, success rates, detection probabilities, and costs are
# aggregate statistical descriptors derived from public sources only:
#   - GAO reports on C-UAS coordination gaps
#   - CISA public insights on UAS threats and ICS security
#   - RAND public research on small-UAS adversary capabilities
#   - IISS Military Balance C-UAS deployment descriptions
#   - Open reporting on published ransomware and intrusion case studies
#
# No classified, CUI, or export-controlled information is used or
# required. Real hardware and agency names appear where they aid the
# defender's ability to map simulation outputs onto real posture
# decisions; the scenario is descriptive, not prescriptive.

# Budget caps — top-level scenario fields. Must appear before
# the first section header so TOML does not attach them to [meta].
attacker_budget = 250_000.0
defender_budget = 50_000_000.0

[meta]
schema_version = 1
name = "Compound Kill Chains — Defensive Planning Wargame"
description = "Research simulation of three concurrent archetypal adversary campaigns (Alpha / Bravo / Charlie) against a notional integrated federal security posture. Exercises the multi-phase campaign schema to quantify doctrinal seams between counter-UAS, cyber, and physical security — a defensive-planning tool, not an operational playbook."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["kill-chain", "compound", "phase-6", "red-team", "defensive-planning", "c-uas"]

