# -- Campaign Alpha — pressure-campaign archetype ---------------------------
#
# Models a low-visibility, intelligence-driven pressure campaign against
# the defender. Analytical signal: how long does the defender have to
# detect the campaign before it reaches a disclosure phase?

[kill_chains.alpha]
id = "alpha"
name = "Campaign Alpha — Intelligence-Led Pressure"
description = "Archetype: passive sensing → wireless environment mapping → credential harvest → disclosure-driven political pressure. Models the defender's exposure to a patient adversary operating below the detection threshold."
attacker = "insider_cell"
target = "federal_security"
entry_phase = "alpha_sensor_emplacement"

[kill_chains.alpha.phases.alpha_sensor_emplacement]
id = "alpha_sensor_emplacement"
name = "Passive Sensor Emplacement"
description = "Aggregate model of a covert persistent-surveillance network (commodity components, e.g. ESP32-class sensors with solar power and cellular backhaul) deployed on public-facing building exteriors near target facilities. Parameters tuned to published open-source cost and detection data."
base_success_probability = 0.90
min_duration = 5
max_duration = 10
detection_probability_per_tick = 0.01
prerequisite_success_boost = 0.0
attribution_difficulty = 0.95
targets_domains = ["PhysicalSecurity", "SignalsIntelligence"]

[kill_chains.alpha.phases.alpha_sensor_emplacement.cost]
attacker_dollars = 500.0
defender_dollars = 4_000_000.0   # Rooftop inspection program scale-up
attacker_resources = 0.5

[[kill_chains.alpha.phases.alpha_sensor_emplacement.outputs]]
type = "IntelligenceGain"
amount = 0.15

[[kill_chains.alpha.phases.alpha_sensor_emplacement.branches]]
condition = { type = "OnSuccess" }
next_phase = "alpha_pattern_of_life"

[[kill_chains.alpha.phases.alpha_sensor_emplacement.branches]]
condition = { type = "OnDetection" }
next_phase = "alpha_abort"

[kill_chains.alpha.phases.alpha_pattern_of_life]
id = "alpha_pattern_of_life"
name = "Pattern-of-Life Aggregation"
description = "Aggregate model of passive sensor collection over ~30 days producing pattern-of-life intelligence on staff movement, facility routines, and protective-detail rotations. No operational tradecraft is modeled; the phase's analytical purpose is to quantify how much intelligence accumulates inside the defender's detection window."
