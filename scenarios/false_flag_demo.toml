# -- Political Climate (minimal) -------------------------------------------

[political_climate]
tension = 0.4
institutional_trust = 0.6
population_segments = []
global_modifiers = []

[political_climate.media_landscape]
fragmentation = 0.4
disinformation_susceptibility = 0.4
state_control = 0.2
social_media_penetration = 0.5
internet_availability = 0.9

# -- Events: deception campaign --------------------------------------------

# Tick 4: Alpha plants a phantom-force belief in Bravo's belief
# state. The phantom is reported to be in `north_west` (Alpha's
# home region) at 500 strength — five times the actual Alpha
# infantry force. Bravo's AI, consuming the belief-derived world
# view, sees this as a real threat and re-prioritizes defense over
# offense.
[events.alpha_phantom_deception]
id = "alpha_phantom_deception"
name = "Alpha Phantom Force (Deception)"
description = "Alpha leaks fabricated SIGINT suggesting a 500-strength reserve battalion sits in north_west."
probability = 1.0
repeatable = false

[[events.alpha_phantom_deception.conditions]]
condition = "TickAtLeast"
tick = 4

[[events.alpha_phantom_deception.effects]]
effect = "DeceptionOp"
source_faction = "alpha"
target_faction = "bravo"

[events.alpha_phantom_deception.effects.payload]
kind = "FalseForceStrength"
force = "alpha_phantom_battalion"
owner = "alpha"
region = "north_west"
false_strength = 500.0

# Tick 8: Alpha plants a second deception — a false morale read on
# Bravo, suggesting Bravo's morale is much higher than reality. A
# higher believed-self-morale doesn't directly affect Bravo's AI in
# round-one (the engine reads true morale from `state.faction_states`
# for self-knowledge), but the report captures the deception event
# count regardless — useful for "how often did Alpha attempt
# deception?" analytics.
[events.alpha_morale_op]
id = "alpha_morale_op"
name = "Alpha Morale Disinformation"
description = "Alpha plants a false belief in Bravo's mind that Bravo's own morale is higher than it is."
probability = 1.0
repeatable = false

[[events.alpha_morale_op.conditions]]
condition = "TickAtLeast"
tick = 8

[[events.alpha_morale_op.effects]]
effect = "DeceptionOp"
source_faction = "alpha"
target_faction = "bravo"

[events.alpha_morale_op.effects.payload]
kind = "FalseFactionMorale"
faction = "bravo"
false_morale = 0.95

# Tick 12: Alpha's resource state is exposed to Bravo at full
# confidence (modelling exfiltration via a captured logistics
# manifest — Bravo's intel service obtains the data, but in
# IntelligenceShare semantics Alpha is the `source_faction` because
# Alpha is where the ground truth originates; Bravo is the
# `target_faction` because Bravo's belief is what gets updated).
# The event refreshes Bravo's belief with whatever Alpha's
# *current* resource level actually is — different from DeceptionOp
# because the source tag is DirectObservation rather than Deceived.
[events.bravo_counter_intel]
id = "bravo_counter_intel"
name = "Alpha Resource State Exposed to Bravo"
description = "Alpha's current resource state is leaked to Bravo via a captured logistics manifest."
probability = 1.0
repeatable = false

[[events.bravo_counter_intel.conditions]]
condition = "TickAtLeast"
tick = 12

[[events.bravo_counter_intel.effects]]
effect = "IntelligenceShare"
source_faction = "alpha"
target_faction = "bravo"

[events.bravo_counter_intel.effects.payload]
kind = "FactionResources"
faction = "alpha"

# -- Simulation Config ------------------------------------------------------

[simulation]
max_ticks = 30
monte_carlo_runs = 16
fog_of_war = false
snapshot_interval = 0
seed = 7

[simulation.tick_duration]
Days = 1

[simulation.attrition_model]
Stochastic = { noise = 0.1 }

# Belief-asymmetry model — Epic M round-one. Without this block, the
# DeceptionOp / IntelligenceShare events would be silent no-ops.
[simulation.belief_model]
enabled = true
force_decay_per_tick = 0.05
region_decay_per_tick = 0.02
scalar_decay_per_tick = 0.03
prune_threshold = 0.05
snapshot_interval = 0

# -- Victory Conditions -----------------------------------------------------

[victory_conditions.alpha_control]
id = "alpha_control"
name = "Alpha Strategic Control"
faction = "alpha"

[victory_conditions.alpha_control.condition]
type = "StrategicControl"
threshold = 0.75

[victory_conditions.bravo_control]
id = "bravo_control"
name = "Bravo Strategic Control"
faction = "bravo"

[victory_conditions.bravo_control.condition]
type = "StrategicControl"
threshold = 0.75
