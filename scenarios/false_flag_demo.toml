intelligence = 0.7
diplomacy = []
doctrine = "Conventional"

[factions.alpha.faction_type]
kind = "Military"
branch = "Army"

[factions.alpha.forces.alpha_infantry]
id = "alpha_infantry"
name = "Alpha 1st Infantry"
unit_type = "Infantry"
region = "north_west"
strength = 100.0
mobility = 1.0
upkeep = 2.0
morale_modifier = 0.0
capabilities = []

[factions.bravo]
id = "bravo"
name = "Faction Bravo — Target"
description = "Southern force whose belief state is the target of Alpha's deception."
color = "#CC3333"
tech_access = []
initial_morale = 0.8
logistics_capacity = 10.0
initial_resources = 100.0
resource_rate = 5.0
