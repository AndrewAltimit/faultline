# False Flag / Belief Asymmetry Demo — Epic M round-one archetype
#
# Demonstrates the persistent belief model and the
# `EventEffect::DeceptionOp` / `EventEffect::IntelligenceShare`
# variants end-to-end. Two factions, four regions in a square. Alpha
# runs a deception campaign that plants a phantom-force belief in
# Bravo's belief state — Bravo's AI (consuming the belief-derived
# world view rather than ground truth) reads the phantom force as a
# real threat and shifts posture accordingly. Mid-run, Alpha
# truthfully shares Bravo's morale with itself via `IntelligenceShare`
# (modelling a captured prisoner / SIGINT take), illustrating that
# the same event family covers truthful intel as well as deception.
#
# The report's `## Belief Asymmetry` section captures per-faction
# mean force-strength error (how far off was each faction's belief?)
# and the count of deception / intel-share events received. With
# `seed = 7` and 16 runs, Bravo's terminal-deceived count stays
# non-zero across most runs — the phantom belief that planting
# lands in tick 4 is rarely refreshed by direct observation before
# run end because Bravo's units don't reach Alpha's home region.
#
# Run with:
#   cargo run -p faultline-cli -- scenarios/false_flag_demo.toml -n 16

[meta]
schema_version = 1
name = "False Flag — Belief Asymmetry Demo"
description = """
Two-faction archetype showing the persistent belief-asymmetry phase
end-to-end. Alpha plants a phantom-force belief in Bravo's belief
state via `DeceptionOp::FalseForceStrength`; Bravo's AI (consuming
the belief-derived world view) reads the phantom as real and reacts.
A later `IntelligenceShare::FactionMorale` from Alpha to itself
illustrates the truthful-intel sibling event. The report's
`## Belief Asymmetry` section tracks per-faction belief accuracy and
deception event counts.
"""
author = "AI Agent Bot"
version = "0.1.0"
tags = ["belief", "deception", "false-flag", "info-ops", "epic-m", "round-one"]

[map]
[map.source]
type = "Grid"
width = 2
height = 2

[map.regions.north_west]
id = "north_west"
name = "North-West"
population = 500000
urbanization = 0.5
initial_control = "alpha"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.regions.north_east]
id = "north_east"
name = "North-East"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_west]
id = "south_west"
name = "South-West"
population = 500000
urbanization = 0.5
strategic_value = 0.5
borders = ["north_west", "south_east"]

[map.regions.south_east]
id = "south_east"
name = "South-East"
population = 500000
urbanization = 0.5
initial_control = "bravo"
strategic_value = 0.5
borders = ["north_east", "south_west"]

[map.infrastructure]

[[map.terrain]]
region = "north_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "north_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_west"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "south_east"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

