# Coalition Fracture Demo — Epic D round two archetype
#
# Demonstrates the alliance_fracture mechanic: a Cooperative neighbor
# that flips to Hostile when the attribution confidence on an attacker
# crosses a threshold. Models the canonical "covert operation loses
# its protective ambiguity once publicly attributed" dynamic — a
# coalition partner can no longer politically sustain cooperation
# with the attacker once the operation lands in open press.
#
# Three factions:
#   - red_attacker: runs a covert chain that gradually accumulates
#     attribution confidence (low attribution_difficulty values mean
#     the defender quickly becomes confident about who's behind it)
#   - blue_defender: target of the chain
#   - gray_partner: a third-party Cooperative ally of red_attacker.
#     Declares an alliance_fracture rule that flips the relationship
#     to Hostile when red's mean attribution >= 0.4 — the analyst
#     reads the per-rule fire rate in the report as "P(coalition
#     breaks under this attribution profile)".
#
# All parameters are aggregate statistical descriptors. The scenario
# is descriptive, not prescriptive, and contains no classified, CUI,
# or export-controlled information.

[meta]
schema_version = 1
name = "Coalition Fracture Demo — Attribution-Driven Alliance Break"
description = "Three-faction archetype showing an alliance fracturing under attribution pressure on a covert kill chain. Surfaces the per-rule fire rate, mean fire tick, and terminal stance distribution in the report's Alliance Dynamics section."
author = "AI Agent Bot"
version = "0.1.0"
tags = ["alliance-fracture", "kill-chain", "attribution", "coalition", "epic-d"]

