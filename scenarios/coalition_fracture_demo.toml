# -- Kill Chain ------------------------------------------------------------
#
# A short three-phase covert chain. attribution_difficulty values are
# moderate (0.5-0.7) so attribution accumulates meaningfully across
# the run. The chain doesn't need to succeed for the fracture rule to
# fire — what matters is whether mean attribution crosses 0.4 in the
# in-flight chains owned by red_attacker.

[kill_chains.fracture_chain]
id = "fracture_chain"
name = "Covert Operation"
description = "Three-phase covert chain whose attribution accumulation drives the alliance fracture decision on gray_partner."
attacker = "red_attacker"
target = "blue_defender"
entry_phase = "approach"

[kill_chains.fracture_chain.phases.approach]
id = "approach"
name = "Approach"
description = "Initial reconnaissance. Low attribution difficulty so the defender quickly forms a hypothesis about the attacker."
base_success_probability = 0.85
min_duration = 3
max_duration = 6
detection_probability_per_tick = 0.04
prerequisite_success_boost = 0.0
attribution_difficulty = 0.65
targets_domains = ["SignalsIntelligence"]

[kill_chains.fracture_chain.phases.approach.cost]
attacker_dollars = 1_000.0
defender_dollars = 5_000.0
attacker_resources = 0.5

[[kill_chains.fracture_chain.phases.approach.branches]]
condition = { type = "OnSuccess" }
next_phase = "exploit"

[kill_chains.fracture_chain.phases.exploit]
id = "exploit"
name = "Exploit"
description = "Mid-chain action. Accumulates the bulk of the defender's attribution confidence."
prerequisites = ["approach"]
base_success_probability = 0.70
min_duration = 4
max_duration = 8
detection_probability_per_tick = 0.06
prerequisite_success_boost = 0.10
attribution_difficulty = 0.50
targets_domains = ["SignalsIntelligence"]

[kill_chains.fracture_chain.phases.exploit.cost]
attacker_dollars = 3_000.0
defender_dollars = 15_000.0
attacker_resources = 1.5

[[kill_chains.fracture_chain.phases.exploit.branches]]
condition = { type = "OnSuccess" }
next_phase = "exfil"

[kill_chains.fracture_chain.phases.exfil]
id = "exfil"
name = "Exfiltrate"
description = "Final step. Lower attribution difficulty here would ordinarily shred the operation's protective ambiguity even further."
prerequisites = ["exploit"]
base_success_probability = 0.80
min_duration = 2
max_duration = 5
detection_probability_per_tick = 0.05
prerequisite_success_boost = 0.10
attribution_difficulty = 0.55
targets_domains = ["SignalsIntelligence"]

[kill_chains.fracture_chain.phases.exfil.cost]
attacker_dollars = 1_500.0
defender_dollars = 8_000.0
attacker_resources = 1.0

