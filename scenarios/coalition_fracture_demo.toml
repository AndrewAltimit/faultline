[[factions.gray_partner.diplomacy]]
target_faction = "blue_defender"
stance = "Neutral"

# Alliance fracture rules: gray_partner's stance toward red_attacker
# flips to Hostile when red's attribution crosses 0.4. A second rule
# fires on tension reaching 0.7 — models the same coalition breaking
# even without a single attribution event, simply because the
# political environment grew too hot.
[factions.gray_partner.alliance_fracture]
[[factions.gray_partner.alliance_fracture.rules]]
id = "attribution_break"
counterparty = "red_attacker"
new_stance = "Hostile"
description = "Public attribution forces the coalition partner to flip Cooperative -> Hostile."
[factions.gray_partner.alliance_fracture.rules.condition]
kind = "AttributionThreshold"
attacker = "red_attacker"
threshold = 0.4

[[factions.gray_partner.alliance_fracture.rules]]
id = "tension_break"
counterparty = "red_attacker"
new_stance = "Hostile"
description = "High political tension breaks the coalition independently of attribution."
[factions.gray_partner.alliance_fracture.rules.condition]
kind = "TensionThreshold"
threshold = 0.7

