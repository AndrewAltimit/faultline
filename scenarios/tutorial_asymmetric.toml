color = "#2255AA"
tech_access = ["surveillance_drone"]
initial_morale = 0.75
logistics_capacity = 80.0
initial_resources = 500.0
resource_rate = 15.0
command_resilience = 0.7
intelligence = 0.6
diplomacy = []
doctrine = "CounterInsurgency"

[factions.government.faction_type]
kind = "Government"

[factions.government.faction_type.institutions.military_hq]
id = "military_hq"
name = "Military High Command"
institution_type = "NationalGuard"
loyalty = 0.8
effectiveness = 0.7
personnel = 5000
fracture_threshold = 0.3

[factions.government.forces.gov_armor]
id = "gov_armor"
name = "1st Armored Brigade"
unit_type = "Armor"
region = "capital"
strength = 120.0
mobility = 0.8
upkeep = 5.0
morale_modifier = 0.1
capabilities = []

[factions.government.forces.gov_infantry]
id = "gov_infantry"
name = "2nd Infantry Division"
unit_type = "Infantry"
region = "suburbs"
strength = 80.0
mobility = 1.0
upkeep = 3.0
morale_modifier = 0.0
capabilities = []

[factions.government.forces.gov_recon]
id = "gov_recon"
name = "Recon Platoon"
unit_type = "SpecialOperations"
region = "farmland"
strength = 20.0
mobility = 1.5
upkeep = 2.0
morale_modifier = 0.05

[[factions.government.forces.gov_recon.capabilities]]
