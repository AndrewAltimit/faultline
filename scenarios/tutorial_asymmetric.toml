# -- Technology (OSINT-derived effect parameters) ---------------------------

[technology.surveillance_drone]
id = "surveillance_drone"
name = "ISR Drone Fleet"
description = "Medium-altitude long-endurance ISR platform. Detection range ~150km against dismounted personnel (published RCS cross-section data)."
category = "Surveillance"
cost_per_tick = 3.0
deployment_cost = 15.0
countered_by = ["concealment_network"]
coverage_limit = 2

[[technology.surveillance_drone.effects]]
type = "DetectionModifier"
factor = 1.5

[[technology.surveillance_drone.effects]]
type = "CombatModifier"
factor = 1.15

[[technology.surveillance_drone.terrain_modifiers]]
terrain = "Rural"
effectiveness = 1.3

[[technology.surveillance_drone.terrain_modifiers]]
terrain = "Urban"
effectiveness = 0.7

[[technology.surveillance_drone.terrain_modifiers]]
terrain = "Forest"
effectiveness = 0.4

[[technology.surveillance_drone.terrain_modifiers]]
terrain = "Mountain"
effectiveness = 0.5

[technology.concealment_network]
id = "concealment_network"
name = "Concealment & Counter-Surveillance Network"
description = "Camouflage, tunnel systems, and decoy operations based on published counterinsurgency doctrine manuals."
category = "Concealment"
cost_per_tick = 1.0
deployment_cost = 5.0
countered_by = []
coverage_limit = 3

[[technology.concealment_network.effects]]
type = "DetectionModifier"
factor = 0.5

[[technology.concealment_network.effects]]
type = "CombatModifier"
factor = 0.9

[[technology.concealment_network.terrain_modifiers]]
terrain = "Forest"
effectiveness = 1.5

[[technology.concealment_network.terrain_modifiers]]
terrain = "Mountain"
effectiveness = 1.4

[[technology.concealment_network.terrain_modifiers]]
terrain = "Urban"
effectiveness = 0.6

# -- Political Climate ------------------------------------------------------

[political_climate]
tension = 0.6
institutional_trust = 0.5
global_modifiers = []

[political_climate.media_landscape]
fragmentation = 0.7
disinformation_susceptibility = 0.5
state_control = 0.3
social_media_penetration = 0.6
internet_availability = 0.7

# Population Segments

[[political_climate.population_segments]]
id = "urban_population"
name = "Urban Middle Class"
fraction = 0.45
concentrated_in = ["capital", "suburbs"]
activation_threshold = 0.75
volatility = 0.4
activated = false

[[political_climate.population_segments.sympathies]]
faction = "government"
sympathy = 0.6

[[political_climate.population_segments.sympathies]]
faction = "insurgents"
sympathy = -0.2

[[political_climate.population_segments.activation_actions]]
action = "Protest"
intensity = 0.6

[[political_climate.population_segments.activation_actions]]
action = "NonCooperation"
effectiveness_reduction = 0.15

[[political_climate.population_segments]]
id = "rural_population"
name = "Rural Communities"
fraction = 0.35
concentrated_in = ["farmland", "highlands", "forest_valley"]
activation_threshold = 0.7
volatility = 0.6
activated = false

[[political_climate.population_segments.sympathies]]
faction = "government"
sympathy = -0.1

[[political_climate.population_segments.sympathies]]
faction = "insurgents"
sympathy = 0.5

[[political_climate.population_segments.activation_actions]]
action = "ArmedResistance"
target_faction = "insurgents"
unit_strength = 15.0

[[political_climate.population_segments.activation_actions]]
action = "MaterialSupport"
target_faction = "insurgents"
rate = 3.0

[[political_climate.population_segments.activation_actions]]
action = "Sabotage"
probability = 0.3

# -- Events -----------------------------------------------------------------

[events.government_crackdown]
id = "government_crackdown"
name = "Government Crackdown"
description = "Government launches a heavy-handed security sweep in rural areas, alienating population"
earliest_tick = 10
probability = 0.8
repeatable = false
chain = "international_condemnation"

[[events.government_crackdown.conditions]]
condition = "TensionAbove"
threshold = 0.65

[[events.government_crackdown.conditions]]
condition = "FactionStrengthAbove"
faction = "government"
threshold = 150.0

[[events.government_crackdown.effects]]
effect = "TensionShift"
delta = 0.15

[[events.government_crackdown.effects]]
effect = "MoraleShift"
faction = "insurgents"
delta = 0.1

[[events.government_crackdown.effects]]
effect = "SympathyShift"
segment = "rural_population"
faction = "insurgents"
delta = 0.2

[events.international_condemnation]
id = "international_condemnation"
name = "International Condemnation"
description = "Foreign governments condemn the crackdown, reducing government resource flow"
probability = 0.9
repeatable = false

[[events.international_condemnation.conditions]]
condition = "EventFired"
event = "government_crackdown"
fired = true

[[events.international_condemnation.effects]]
effect = "ResourceChange"
faction = "government"
delta = -50.0

[[events.international_condemnation.effects]]
effect = "MoraleShift"
faction = "government"
delta = -0.1

[events.supply_line_disruption]
id = "supply_line_disruption"
name = "Supply Line Disruption"
description = "Insurgents disrupt government supply chains through the farmland"
earliest_tick = 15
probability = 0.6
repeatable = true

[[events.supply_line_disruption.conditions]]
condition = "RegionControl"
region = "farmland"
faction = "insurgents"
controlled = true

[[events.supply_line_disruption.effects]]
effect = "DamageInfra"
infra = "farmland_supply"
damage = 0.25

[[events.supply_line_disruption.effects]]
effect = "ResourceChange"
faction = "government"
delta = -10.0

# -- Simulation Config ------------------------------------------------------

[simulation]
max_ticks = 365
monte_carlo_runs = 100
fog_of_war = true
snapshot_interval = 30
seed = 42

[simulation.tick_duration]
Days = 1

[simulation.attrition_model]
Stochastic = { noise = 0.15 }

# -- Victory Conditions -----------------------------------------------------

[victory_conditions.government_control]
id = "government_control"
name = "Government Restores Order"
faction = "government"

[victory_conditions.government_control.condition]
type = "StrategicControl"
threshold = 0.8

[victory_conditions.insurgent_collapse_morale]
id = "insurgent_collapse_morale"
name = "Insurgent Victory — Government Morale Collapse"
faction = "insurgents"

[victory_conditions.insurgent_collapse_morale.condition]
type = "MilitaryDominance"
enemy_strength_below = 50.0
