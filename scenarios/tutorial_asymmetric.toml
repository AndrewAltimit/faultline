# Tutorial: Asymmetric Conflict
#
# A government faction with conventional forces fights an insurgent
# faction using guerrilla tactics. Features terrain variation, tech
# cards, population dynamics, event chains, and fog of war.
#
# All capability parameters are derived from publicly available OSINT.
# See LEGAL.md for sourcing requirements.

[meta]
name = "Tutorial — Asymmetric Conflict"
description = """
Government security forces confront a rural insurgency across six
regions. The government has superior firepower and surveillance
technology but must control territory. The insurgents rely on
population support, concealment, and guerrilla hit-and-run tactics.
Demonstrates doctrine variants, fog of war, tech cards, event chains,
and civilian segment activation.
"""
author = "AndrewAltimit"
version = "0.1.0"
tags = ["tutorial", "asymmetric", "insurgency", "fog-of-war"]

# -- Map (6 regions) -------------------------------------------------------

[map]
[map.source]
type = "Grid"
width = 3
height = 2

[map.regions.capital]
id = "capital"
name = "Capital District"
population = 2000000
urbanization = 0.9
initial_control = "government"
strategic_value = 10.0
borders = ["suburbs", "farmland"]

[map.regions.suburbs]
id = "suburbs"
name = "Suburban Belt"
population = 800000
urbanization = 0.6
initial_control = "government"
strategic_value = 3.0
borders = ["capital", "farmland", "highlands"]

[map.regions.farmland]
id = "farmland"
name = "Central Farmland"
population = 300000
urbanization = 0.2
strategic_value = 2.0
borders = ["capital", "suburbs", "forest_valley", "highlands"]

[map.regions.highlands]
id = "highlands"
name = "Eastern Highlands"
population = 150000
urbanization = 0.1
strategic_value = 1.5
borders = ["suburbs", "farmland", "forest_valley"]

[map.regions.forest_valley]
id = "forest_valley"
name = "Forest Valley"
population = 100000
urbanization = 0.05
initial_control = "insurgents"
strategic_value = 1.0
borders = ["farmland", "highlands", "mountain_refuge"]

[map.regions.mountain_refuge]
id = "mountain_refuge"
name = "Mountain Refuge"
population = 50000
urbanization = 0.02
initial_control = "insurgents"
strategic_value = 0.5
borders = ["forest_valley"]

# -- Infrastructure ---------------------------------------------------------

[map.infrastructure.capital_power]
id = "capital_power"
name = "Capital Power Grid"
region = "capital"
infra_type = "PowerGrid"
criticality = 0.9
initial_status = 1.0
repairable = 30

[map.infrastructure.capital_telecom]
id = "capital_telecom"
name = "National Telecom Hub"
region = "capital"
infra_type = "Telecommunications"
criticality = 0.8
initial_status = 1.0
repairable = 20

[map.infrastructure.farmland_supply]
id = "farmland_supply"
name = "Agricultural Supply Chain"
region = "farmland"
infra_type = "SupplyChain"
criticality = 0.5
initial_status = 1.0
repairable = 15

# -- Terrain ----------------------------------------------------------------

[[map.terrain]]
region = "capital"
terrain_type = "Urban"
movement_modifier = 0.8
defense_modifier = 1.3
visibility = 0.7

[[map.terrain]]
region = "suburbs"
terrain_type = "Suburban"
movement_modifier = 0.9
defense_modifier = 1.1
visibility = 0.8

[[map.terrain]]
region = "farmland"
terrain_type = "Rural"
movement_modifier = 1.0
defense_modifier = 1.0
visibility = 1.0

[[map.terrain]]
region = "highlands"
terrain_type = "Mountain"
movement_modifier = 0.5
defense_modifier = 1.5
visibility = 0.6

[[map.terrain]]
region = "forest_valley"
terrain_type = "Forest"
movement_modifier = 0.6
defense_modifier = 1.4
visibility = 0.4

[[map.terrain]]
region = "mountain_refuge"
terrain_type = "Mountain"
movement_modifier = 0.4
defense_modifier = 1.8
visibility = 0.3

# -- Factions ---------------------------------------------------------------

[factions.government]
