[factions.insurgents.forces.insurgent_militia]
id = "insurgent_militia"
name = "Valley Militia"
unit_type = "Militia"
region = "forest_valley"
strength = 50.0
mobility = 1.2
upkeep = 1.0
morale_modifier = 0.1
capabilities = []

[factions.insurgents.forces.insurgent_specops]
id = "insurgent_specops"
name = "Mountain Raiders"
unit_type = "SpecialOperations"
region = "mountain_refuge"
strength = 30.0
mobility = 1.5
upkeep = 1.5
morale_modifier = 0.15

[[factions.insurgents.forces.insurgent_specops.capabilities]]
